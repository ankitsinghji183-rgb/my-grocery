<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;}
        .dk-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .add-row{background:#e8f5e9;padding:10px 8px;margin:8px 0 0;border-radius:8px;border:1px dashed #2ecc71;}
        .add-row-title{font-size:11px;font-weight:800;color:#27ae60;margin-bottom:6px;}
    </style>
</head>
<body>

<div id="mainView">
    <div style="display:flex;gap:8px;padding:8px 10px;">
        <div class="h-box" style="flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;" onclick="hType='shopping';openPage('hPage');renderH();">📦 Saman Hist</div>
        <div class="h-box" style="flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;" onclick="hType='expense';openPage('hPage');renderH();">💰 Kharch Hist</div>
    </div>
    <div class="card">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:76px;">
                <option value="GROC">GROC</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')" id="btn-All" class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROC')" id="btn-GROC" class="btn f-btn">GROC</button>
            <button onclick="setFilter('SABJI')" id="btn-SABJI" class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')" id="btn-BODY" class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')" id="btn-OTHER" class="btn f-btn">ANYA</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<div id="dailyKharchPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💸 Daily Kharcha</span>
        <span id="dkDateLabel" style="font-size:12px;"></span>
    </div>
    <div class="add-row">
        <div class="add-row-title">Item Jodo</div>
        <div class="in-row">
            <input type="text" id="kName" style="flex:1;" placeholder="Item Naam">
            <input type="number" id="kQty" class="u-box" placeholder="Qty">
            <input type="number" id="kPrice" class="p-box" placeholder="₹ Rate">
            <button class="btn" onclick="addK()" style="background:#2ecc71;width:48px;">ADD</button>
        </div>
    </div>
    <div class="scroll" id="dkList"></div>
    <div id="dkSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="hPage" class="full-page">
    <div class="p-head"><span class="back" onclick="closePage()">BACK</span><span id="hTitle">History</span><span></span></div>
    <div class="scroll" id="hArea"></div>
</div>

<div id="listPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>🛒 Shopping List</span>
        <button class="btn" style="background:#fff;color:#0984e3;padding:0 10px;" onclick="setLang(listLang=='hi'?'en':'hi')">HI/EN</button>
    </div>
    <div class="scroll" id="shotArea" style="background:white;padding:15px;"><div id="fOut"></div></div>
    <div class="b-nav">
        <button class="btn" style="background:#f39c12;flex:1;" onclick="takeShot()">📷 SAVE IMAGE</button>
        <button class="btn" style="background:#27ae60;flex:1;" onclick="openCalc()">💰 Bill Calc</button>
    </div>
</div>

<script>
const firebaseConfig = { databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('grocery/3');

let items = [], appHistory = { shopping:[], expense:[] }, activeF='All', listLang='hi';
let todayDK = new Date().toLocaleDateString('en-GB');

db.on('value', snap => {
    const d = snap.val();
    if(d){
        items = d.items || [];
        appHistory = d.history || {shopping:[],expense:[]};
        if(!Array.isArray(appHistory.shopping)) appHistory.shopping = Object.values(appHistory.shopping||{});
        if(!Array.isArray(appHistory.expense)) appHistory.expense = Object.values(appHistory.expense||{});
    }
    renderMaster();
});

function save(){ db.set({items, history:appHistory}); }

function openPage(id){
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='none';
    document.getElementById(id).style.display='flex';
    window.history.pushState({p:id},'');
}

function closePage(){ window.history.back(); }
window.onpopstate=()=>{
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='flex';
};

// --- DAILY KHARCH FIX ---
function openDailyKharch(){
    todayDK = new Date().toLocaleDateString('en-GB');
    document.getElementById('dkDateLabel').innerText = todayDK;
    openPage('dailyKharchPage');
    renderDK(todayDK);
}

function addK(){
    let n = document.getElementById('kName').value.trim();
    let q = parseFloat(document.getElementById('kQty').value) || 0;
    let p = parseFloat(document.getElementById('kPrice').value) || 0;
    if(!n) return;

    let rec = appHistory.expense.find(h=>h.date===todayDK);
    if(!rec){ rec={date:todayDK, items:[]}; appHistory.expense.unshift(rec); }

    let ex = rec.items.find(e=>e.name.toLowerCase()===n.toLowerCase());
    if(ex){
        ex.qty += q; ex.price += p;
    } else {
        rec.items.push({name:n, qty:q, price:p, done:false});
    }

    document.getElementById('kName').value='';
    document.getElementById('kQty').value='';
    document.getElementById('kPrice').value='';
    save();
    renderDK(todayDK);
}

function renderDK(d){
    let area=document.getElementById('dkList');
    let rec=appHistory.expense.find(h=>h.date===d);
    let total=0;
    if(!rec || rec.items.length===0){
        area.innerHTML="<p style='text-align:center;padding:20px;'>Aaj koi kharcha nahi hai.</p>";
        document.getElementById('dkSum').innerText="TOTAL: ₹0";
        return;
    }
    area.innerHTML=rec.items.map((it,i)=>{
        total += (parseFloat(it.price)||0);
        return `<div class="dk-grid">
            <span>${i+1}</span>
            <b>${it.name}</b>
            <input type="number" value="${it.qty}" onchange="dkUpd('${d}',${i},'qty',this.value)" class="u-box">
            <input type="number" value="${it.price}" onchange="dkUpd('${d}',${i},'price',this.value)" class="p-box">
            <button class="btn" style="background:#fdcb6e" onclick="dkLock('${d}',${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="dkDel('${d}',${i})">✕</button>
        </div>`;
    }).join('');
    document.getElementById('dkSum').innerText=`TOTAL: ₹${total.toFixed(2)}`;
}

function dkUpd(d,i,f,v){ let r=appHistory.expense.find(h=>h.date===d); if(r){r.items[i][f]=parseFloat(v)||0; save(); renderDK(d);}}
function dkDel(d,i){ if(confirm("Hataein?")){ let r=appHistory.expense.find(h=>h.date===d); if(r){r.items.splice(i,1); save(); renderDK(d);}}}

// --- MASTER & LIST ---
function renderMaster(){
    let cont=document.getElementById('masterList');
    if(!cont) return;
    let q=document.getElementById('itemName').value.toLowerCase();
    let fil=items.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    cont.innerHTML=fil.map((it,idx)=>{
        let i = items.indexOf(it);
        return `<div class="item-row" style="display:flex;padding:10px;background:white;margin-bottom:2px;align-items:center;gap:10px;${it.sel?'background:#fff9db':''}">
            <b style="flex:1" onclick="toggleI(${i})">${it.name}</b>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})">
            <button class="btn del-btn" onclick="delItem(${i})" style="height:30px;">✕</button>
        </div>`;
    }).join('');
}
function toggleI(i){ items[i].sel=!items[i].sel; save(); renderMaster(); }
function addItem(){
    let n=document.getElementById('itemName').value.trim();
    if(n){ items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:true,qty:1,unit:'Kg'}); save(); document.getElementById('itemName').value=''; renderMaster(); }
}
function setFilter(f){ activeF=f; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+f).classList.add('active'); renderMaster(); }
function showFinalList(){ openPage('listPage'); renderFinalList(); }
function renderFinalList(){
    let out=document.getElementById('fOut');
    let sel=items.filter(it=>it.sel);
    out.innerHTML=`<h2 style="text-align:center;">🛒 SAMAN LIST</h2>`;
    ['GROC','SABJI','BODY','OTHER'].forEach(c=>{
        let f=sel.filter(it=>it.cat===c);
        if(f.length){
            out.innerHTML+=`<div style="background:#eee;padding:5px;margin:10px 0;"><b>${c}</b></div>`;
            f.forEach((it,j)=> out.innerHTML+=`<div style="padding:5px;border-bottom:1px dashed #ccc;">${j+1}. ${it.name} _________</div>`);
        }
    });
}
function takeShot(){ html2canvas(document.getElementById('shotArea')).then(c=>{ let a=document.createElement('a'); a.download='List.png'; a.href=c.toDataURL(); a.click(); });}
</script>
</body>
</html>
