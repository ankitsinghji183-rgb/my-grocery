<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0984e3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;}
        #loadingScreen h2{font-size:22px;margin-bottom:10px;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        input:disabled{background:#f1f2f6;color:#7f8c8d;border:1px dashed #bdc3c7;font-weight:bold;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;width:36px;}
        .ok-btn{background:#2ecc71!important;min-width:36px;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;min-width:36px;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;border-bottom:1px solid #f1f2f6;background:white;margin-bottom:3px;border-radius:8px;}
        .edit-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .calc-row{display:grid;grid-template-columns:1fr 62px 76px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .hist-row{display:grid;grid-template-columns:1fr 82px 40px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .sel-bg{background:#fff9db!important;border-left:4px solid #fcc419;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;position:relative;z-index:1001;}
        .top-hist{display:flex;gap:8px;padding:8px 10px;flex-shrink:0;}
        .h-box{flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;}
        .month-header{background:#f8f9fa;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;border-left:4px solid #0984e3;}
        .add-row{background:#e8f5e9;padding:10px 8px;border-radius:8px;border:1px dashed #2ecc71;flex-shrink:0;margin-bottom:0;}
        .add-row-title{font-size:11px;font-weight:800;color:#27ae60;margin-bottom:6px;}
        .lang-btn{padding:5px 12px;border:2px solid white;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;background:transparent;color:white;height:34px;}
        .lang-btn.active{background:white;color:#0984e3;}
    </style>
</head>
<body>

<div id="loadingScreen"><h2>🛒 Grocery Master</h2><p>Data load ho raha hai...</p></div>

<!-- MAIN VIEW -->
<div id="mainView" style="display:none;">
    <div style="display:flex;gap:6px;padding:6px 8px;flex-shrink:0;align-items:stretch;">
        <div id="monthlyBox" onclick="toggleMonthDrop()" style="background:white;border-radius:10px;padding:6px 8px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;display:flex;align-items:center;flex:1.2;cursor:pointer;">
            <div id="monthlyList" style="display:flex;flex-wrap:wrap;gap:3px;pointer-events:none;"></div>
        </div>
        <div class="h-box" style="padding:8px 0;font-size:10px;flex:0.9;" onclick="openSamanHist()">📦 Saman</div>
        <div class="h-box" style="padding:8px 0;font-size:10px;flex:0.9;" onclick="openKharchHist()">💰 Kharch</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:66px;flex-shrink:0;font-size:11px;">
                <option value="GROCERY">GROC</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')"     id="btn-All"     class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GROC</button>
            <button onclick="setFilter('SABJI')"   id="btn-SABJI"   class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')"    id="btn-BODY"    class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')"   id="btn-OTHER"   class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<!-- KHARCH HISTORY -->
<div id="kharchHistPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💰 Kharch History</span>
        <span style="position:relative;">
            <span onclick="document.getElementById('kharchHistDatePicker').showPicker?document.getElementById('kharchHistDatePicker').showPicker():document.getElementById('kharchHistDatePicker').click()"
                style="font-size:12px;background:rgba(255,255,255,0.25);padding:4px 8px;border-radius:6px;cursor:pointer;">📅 Date</span>
            <input type="date" id="kharchHistDatePicker"
                style="position:absolute;opacity:0;width:1px;height:1px;top:0;right:0;"
                onchange="kharchHistDateGo(this.value)">
        </span>
    </div>
    <div class="scroll" id="kharchHistArea"></div>
</div>

<!-- SAMAN HISTORY -->
<div id="samanHistPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>📦 Saman History</span>
        <span style="position:relative;">
            <span onclick="document.getElementById('samanHistDatePicker').showPicker?document.getElementById('samanHistDatePicker').showPicker():document.getElementById('samanHistDatePicker').click()"
                style="font-size:12px;background:rgba(255,255,255,0.25);padding:4px 8px;border-radius:6px;cursor:pointer;">📅 Date</span>
            <input type="date" id="samanHistDatePicker"
                style="position:absolute;opacity:0;width:1px;height:1px;top:0;right:0;"
                onchange="samanHistDateGo(this.value)">
        </span>
    </div>
    <div class="scroll" id="samanHistArea"></div>
</div>

<!-- KHARCH EDIT -->
<div id="kharchEditPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💰 Kharch</span>
        <span style="position:relative;">
            <span id="kharchEditDate" onclick="document.getElementById('kharchDatePicker').showPicker?document.getElementById('kharchDatePicker').showPicker():document.getElementById('kharchDatePicker').click()"
                style="font-size:13px;background:rgba(255,255,255,0.25);padding:4px 10px;border-radius:6px;cursor:pointer;">📅 --/--/----</span>
            <input type="date" id="kharchDatePicker"
                style="position:absolute;opacity:0;width:1px;height:1px;top:0;right:0;"
                onchange="kharchDateChanged(this.value)">
        </span>
    </div>
    <div class="add-row" style="margin:8px;">
        <div class="add-row-title">Add Item</div>
        <div class="in-row">
            <input type="text"   id="kAddName"  style="flex:1;" placeholder="Item ka naam">
            <input type="number" id="kAddQty"   class="u-box" placeholder="Qty" inputmode="decimal">
            <input type="number" id="kAddPrice" class="p-box" placeholder="₹"   inputmode="decimal">
            <button class="btn" style="background:#2ecc71;width:48px;" onclick="kAddItem()">ADD</button>
        </div>
    </div>
    <div class="scroll" id="kEditList"></div>
    <div id="kEditSum" class="sum-box">TOTAL: ₹0</div>
</div>

<!-- SAMAN EDIT -->
<div id="samanEditPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>📦 Saman Edit</span>
        <span style="position:relative;">
            <span id="samanEditDate" onclick="document.getElementById('samanDatePicker').showPicker?document.getElementById('samanDatePicker').showPicker():document.getElementById('samanDatePicker').click()"
                style="font-size:13px;background:rgba(255,255,255,0.25);padding:4px 10px;border-radius:6px;cursor:pointer;">📅 --/--/----</span>
            <input type="date" id="samanDatePicker"
                style="position:absolute;opacity:0;width:1px;height:1px;top:0;right:0;"
                onchange="samanDateChanged(this.value)">
        </span>
    </div>
    <div class="add-row" style="margin:8px;">
        <div class="add-row-title">Add Item</div>
        <div class="in-row">
            <input type="text"   id="sAddName"  style="flex:1;" placeholder="Item ka naam">
            <input type="number" id="sAddQty"   class="u-box" placeholder="Qty" inputmode="decimal">
            <input type="number" id="sAddPrice" class="p-box" placeholder="₹"   inputmode="decimal">
            <button class="btn" style="background:#2ecc71;width:48px;" onclick="sAddItem()">ADD</button>
        </div>
    </div>
    <div class="scroll" id="sEditList"></div>
    <div id="sEditSum" class="sum-box">TOTAL: ₹0</div>
</div>

<!-- CALC -->
<div id="calcPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="showPage('listPage');renderFinalList();">BACK</span>
        <span>💰 Bill Calc</span>
        <span></span>
    </div>
    <div class="scroll" id="cList"></div>
    <div id="cSum" class="sum-box">BILL TOTAL: ₹0</div>
</div>

<!-- LIST VIEW -->
<div id="listPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span id="listTitle">सामान सूची</span>
        <div style="display:flex;gap:5px;">
            <button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button>
            <button class="lang-btn"        id="btnEn" onclick="setLang('en')">ENG</button>
        </div>
    </div>
    <div class="scroll" style="background:#fff;">
        <div id="shotArea" style="padding:18px;background:white;"><div id="fOut"></div></div>
    </div>
    <div class="b-nav">
        <button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button>
        <button class="btn" style="background:#2ecc71;flex:1;height:48px;" onclick="openCalc()">💰 CALC</button>
    </div>
</div>

<script>
// ====== FIREBASE CONFIGURATION ======
const firebaseConfig={databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/"};
firebase.initializeApp(firebaseConfig);
const DB=firebase.database().ref('grocery/3');

// ====== APPLICATION STATE ======
let items=[],expense=[],shopping=[];
let activeF='All',tCalc=[],listLang='hi';
let curKharchDate='',curSamanDate='';
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ====== INITIAL DATA LOAD ======
DB.off();
DB.get().then(snap=>{
    const d=snap.val()||{};
    items    = toArr(d.items);
    const h  = d.history||{};
    expense  = toArr(h.expense);
    shopping = toArr(h.shopping);
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainView').style.display='flex';
    renderMaster();
    renderMonthlyTotal();
}).catch(e=>{
    document.getElementById('loadingScreen').innerHTML='<h2>Error</h2><p>Reload karo</p>';
    console.error(e);
});

function toArr(x){return Array.isArray(x)?x:Object.values(x||{});}

function save(){
    DB.set({items, history:{expense, shopping}}).catch(e=>console.error('Save error:',e));
}

// ====== NAVIGATION ======
function showPage(id){
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='none';
    document.getElementById(id).style.display='flex';
    window.history.pushState({p:id},'');
}
function closePage(){window.history.back();}
window.onpopstate=()=>{
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='flex';
    renderMaster();
};

// ====== MASTER LIST RENDER & OPERATIONS ======
function renderMaster(){
    let cont=document.getElementById('masterList'); if(!cont) return;
    let q=document.getElementById('itemName').value.toLowerCase();
    let all=items.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    let selected=all.filter(it=>it.sel);
    let unselected=all.filter(it=>!it.sel);
    let filtered=[...selected,...unselected];
    let n=0;
    cont.innerHTML=filtered.map(it=>{
        let i=items.indexOf(it);
        return `<div class="item-row ${it.sel?'sel-bg':''}">
            <span onclick="toggleI(${i})" style="cursor:pointer;font-size:13px;"><b>${++n}. ${it.name}</b></span>
            ${(it.unit==='Open'||it.unit==='Send') ? '<span class="u-box" style="font-size:11px;color:#aaa;text-align:center;">—</span>' : `<input type="number" value="${it.qty||''}" onchange="items[${i}].qty=this.value;save();" class="u-box" inputmode="decimal">`}
            <select onchange="items[${i}].unit=this.value;save();renderMaster();" class="unit-sel">
                <option value="Kg"    ${it.unit=='Kg'    ?'selected':''}>Kg</option>
                <option value="Ltr"   ${it.unit=='Ltr'   ?'selected':''}>Ltr</option>
                <option value="Pc"    ${it.unit=='Pc'    ?'selected':''}>Pc</option>
                <option value="Pkt"   ${it.unit=='Pkt'   ?'selected':''}>Pkt</option>
                <option value="Open"  ${it.unit=='Open'  ?'selected':''}>Open</option>
                <option value="Rs"    ${it.unit=='Rs'    ?'selected':''}>Rs</option>
                <option value="Send"  ${it.unit=='Send'  ?'selected':''}>Send</option>
                <option value="Plate" ${it.unit=='Plate' ?'selected':''}>Plate</option>
                <option value="Form"  ${it.unit=='Form'  ?'selected':''}>Form</option>
                <option value="Cup"   ${it.unit=='Cup'   ?'selected':''}>Cup</option>
                <option value="Glass" ${it.unit=='Glass' ?'selected':''}>Glass</option>
            </select>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})" style="width:22px;height:22px;">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
    renderMonthlyTotal();
}
function toggleI(i){items[i].sel=!items[i].sel;save();renderMaster();}
function addItem(){
    let n=document.getElementById('itemName').value.trim(); if(!n) return;
    items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:true,qty:'',unit:'Kg'});
    save(); document.getElementById('itemName').value=''; renderMaster();
}
function delItem(i){if(confirm("Hata dein?")){items.splice(i,1);save();renderMaster();}}
function setFilter(f){
    activeF=f;
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    let b=document.getElementById('btn-'+f); if(b) b.classList.add('active');
    renderMaster();
}
function unselectAll(){if(confirm("Sab clear?")){items.forEach(it=>it.sel=false);save();renderMaster();}}

// ====== DAILY KHARCH OPERATIONS ======
function openDailyKharch(){
    curKharchDate=new Date().toLocaleDateString('en-GB');
    if(!expense.find(h=>h.date===curKharchDate)){
        expense.unshift({date:curKharchDate,items:[]});
    }
    showPage('kharchEditPage');
    renderKharchEdit();
}

// ====== KHARCH HISTORY MANAGEMENT ======
function openKharchHist(){
    renderKharchHist();
    showPage('kharchHistPage');
}
function renderKharchHist(){
    let area=document.getElementById('kharchHistArea'); area.innerHTML='';
    let arr=expense.filter(h=>h.items&&h.items.length>0);
    let sorted=[...arr].sort((a,b)=>dateDiff(b.date,a.date));
    if(!sorted.length){area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi kharch nahi hai.</p>"; return;}
    let curM='',html='',mTot=0;
    sorted.forEach(h=>{
        let m=dateToMonth(h.date);
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        if(curM!==m&&curM!==''){area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html; html=''; mTot=0;}
        curM=m; mTot+=dTot;
        let itemsHTML_k = h.items.map((it,ii)=>{
            let qStr=fmtQtyHi(it.qty,it.unit);
            let pStr=it.price>0?`₹${parseFloat(it.price).toFixed(2)}`:'—';
            return `<div style="display:grid;grid-template-columns:22px 1fr 80px 70px;gap:4px;padding:6px 8px;border-bottom:1px solid #f5f5f5;font-size:12px;align-items:center;">
                <span style="color:#aaa;">${ii+1}.</span>
                <span style="font-weight:600;">${it.name}</span>
                <span style="color:#0984e3;text-align:center;">${qStr}</span>
                <span style="color:#e17055;text-align:right;font-weight:700;">${pStr}</span>
            </div>`;
        }).join('') + `<div style="display:grid;grid-template-columns:1fr 70px;padding:7px 8px;background:#e3f2fd;font-weight:900;font-size:13px;">
            <span style="color:#636e72;">TOTAL</span>
            <span style="color:#0984e3;text-align:right;">₹${dTot.toFixed(2)}</span>
        </div>`;
        html+=`<div style="background:white;margin-bottom:4px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
            <div class="hist-row" style="cursor:pointer;" onclick="toggleDrop('kd_${h.date.replace(/\//g,'_')}')">
                <span style="font-size:13px;font-weight:700;">${h.date}</span>
                <b style="color:#0984e3;">₹${dTot.toFixed(2)}</b>
                <button class="btn ok-btn" style="font-size:10px;" onclick="event.stopPropagation();openKharchEdit('${h.date}')">EDIT</button>
                <button class="btn del-btn" onclick="event.stopPropagation();delKharchRec('${h.date}')">✕</button>
            </div>
            <div id="kd_${h.date.replace(/\//g,'_')}" style="display:none;">${itemsHTML_k}</div>
        </div>`;
    });
    if(curM) area.innerHTML+=`<div class="month-header"><span style="color:#0984e3;">${curM}</span> <span style="color:#2d3436;">— Total: </span><span style="color:#d63031;">₹${mTot.toFixed(2)}</span></div>`+html;
}
function openKharchEdit(date){
    curKharchDate=date;
    renderKharchEdit();
    showPage('kharchEditPage');
}
function renderKharchEdit(){
    let dlabel=document.getElementById('kharchEditDate');
    if(dlabel) dlabel.innerText='📅 '+curKharchDate;
    let dp=document.getElementById('kharchDatePicker');
    if(dp && curKharchDate){
        let p=curKharchDate.split('/');
        if(p.length===3) dp.value=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    }
    let na=document.getElementById('kAddName'); if(na) na.value='';
    let qa=document.getElementById('kAddQty');  if(qa) qa.value='';
    let pa=document.getElementById('kAddPrice'); if(pa) pa.value='';
    let rec=expense.find(h=>h.date===curKharchDate);
    let area=document.getElementById('kEditList');
    if(!rec||!rec.items.length){
        area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi item nahi. Upar se add karo.</p>";
        document.getElementById('kEditSum').innerText='TOTAL: ₹0';
        return;
    }
    area.innerHTML=rec.items.map((it,i)=>
        `<div style="background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;padding:8px 6px;">
            <div style="display:grid;grid-template-columns:18px 1fr 76px 36px 36px;gap:4px;align-items:center;margin-bottom:4px;">
                <span style="color:#636e72;font-size:11px;">${i+1}.</span>
                <input type="text" ${it.done?'disabled':''} value="${it.name}"
                    onchange="kField(${i},'name',this.value)" style="font-size:13px;min-width:0;height:36px;padding:5px;">
                <input type="number" ${it.done?'disabled':''} value="${it.price||''}"
                    onchange="kField(${i},'price',this.value)" class="p-box" style="height:36px;" inputmode="decimal">
                <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="kLock(${i})" style="height:36px;">${it.done?'✓':'🔒'}</button>
                <button class="btn del-btn" onclick="kDel(${i})" style="height:36px;">✕</button>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;align-items:center;">
                <span style="font-size:12px;color:#0984e3;font-weight:700;padding-left:22px;">${fmtQtyHi(it.qty,it.unit)}</span>
                <div style="display:flex;gap:3px;align-items:center;">
                    <input type="number" ${it.done?'disabled':''} value="${it.qty||''}"
                        onchange="kField(${i},'qty',this.value)" style="width:55px;height:32px;font-size:12px;" inputmode="decimal">
                    <select ${it.done?'disabled':''} onchange="kField(${i},'unit',this.value)" style="height:32px;font-size:11px;background:#f1f2f6;border:none;border-radius:6px;padding:0 2px;flex:1;">
                        <option value="Kg"    ${it.unit=='Kg'    ?'selected':''}>Kg</option>
                        <option value="Ltr"   ${it.unit=='Ltr'   ?'selected':''}>Ltr</option>
                        <option value="Pc"    ${it.unit=='Pc'    ?'selected':''}>Pc</option>
                        <option value="Pkt"   ${it.unit=='Pkt'   ?'selected':''}>Pkt</option>
                        <option value="Open"  ${it.unit=='Open'  ?'selected':''}>Open</option>
                        <option value="Rs"    ${it.unit=='Rs'    ?'selected':''}>Rs</option>
                        <option value="Send"  ${it.unit=='Send'  ?'selected':''}>Send</option>
                        <option value="Plate" ${it.unit=='Plate' ?'selected':''}>Plate</option>
                        <option value="Form"  ${it.unit=='Form'  ?'selected':''}>Form</option>
                        <option value="Cup"   ${it.unit=='Cup'   ?'selected':''}>Cup</option>
                        <option value="Glass" ${it.unit=='Glass' ?'selected':''}>Glass</option>
                    </select>
                </div>
            </div>
        </div>`
    ).join('');
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('kEditSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
}

function kAddItem(){
    let n=document.getElementById('kAddName').value.trim();
    let q=parseFloat(document.getElementById('kAddQty').value)||0;
    let p=parseFloat(document.getElementById('kAddPrice').value)||0;
    if(!n){alert("Naam zaroor bharein!"); return;}
    if(!curKharchDate) curKharchDate=new Date().toLocaleDateString('en-GB');
    let rec=expense.find(h=>h.date===curKharchDate);
    if(!rec){rec={date:curKharchDate,items:[]};expense.unshift(rec);}
    let ex=rec.items.find(e=>e.name.toLowerCase()===n.toLowerCase());
    if(ex){ex.qty=(parseFloat(ex.qty)||0)+q; ex.price=(parseFloat(ex.price)||0)+p;}
    else   rec.items.push({name:n,qty:q,price:p,done:false,unit:'Kg'});
    document.getElementById('kAddName').value='';
    document.getElementById('kAddQty').value='';
    document.getElementById('kAddPrice').value='';
    renderKharchEdit();
    renderMonthlyTotal();
    save();
}
function kField(i,f,v){
    let rec=expense.find(h=>h.date===curKharchDate); if(!rec) return;
    if(f==='name'||f==='unit') rec.items[i][f]=v;
    else rec.items[i][f]=parseFloat(v)||0;
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('kEditSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
    renderKharchEdit();
    save();
}
function kharchHistDateGo(val){ if(!val)return; let p=val.split('-'); openKharchEdit(`${p[2]}/${p[1]}/${p[0]}`); }
function kharchDateChanged(val){ if(!val)return; let p=val.split('-'); curKharchDate=`${p[2]}/${p[1]}/${p[0]}`; renderKharchEdit(); }
function kLock(i){
    let rec=expense.find(h=>h.date===curKharchDate); if(!rec) return;
    rec.items[i].done=!rec.items[i].done; renderKharchEdit(); save();
}
function kDel(i){
    if(confirm("Delete?")){
        let rec=expense.find(h=>h.date===curKharchDate);
        if(rec){rec.items.splice(i,1); renderKharchEdit(); save();}
    }
}
function delKharchRec(date){
    if(confirm("Poora din hataein?")){expense=expense.filter(h=>h.date!==date);save();renderKharchHist();}
}

// ====== SAMAN HISTORY MANAGEMENT ======
function openSamanHist(){
    renderSamanHist();
    showPage('samanHistPage');
}
function renderSamanHist(){
    let area=document.getElementById('samanHistArea'); area.innerHTML='';
    let arr=shopping.filter(h=>h.items&&h.items.length>0);
    let sorted=[...arr].sort((a,b)=>dateDiff(b.date,a.date));
    if(!sorted.length){area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi history nahi hai.</p>"; return;}
    let curM='',html='',mTot=0;
    sorted.forEach(h=>{
        let m=dateToMonth(h.date);
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        if(curM!==m&&curM!==''){area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html; html=''; mTot=0;}
        curM=m; mTot+=dTot;
        let itemsHTML_s = h.items.map((it,ii)=>{
            let qStr=fmtQtyHi(it.qty,it.unit);
            let pStr=it.price>0?`₹${parseFloat(it.price).toFixed(2)}`:'—';
            return `<div style="display:grid;grid-template-columns:22px 1fr 80px 70px;gap:4px;padding:6px 8px;border-bottom:1px solid #f5f5f5;font-size:12px;align-items:center;">
                <span style="color:#aaa;">${ii+1}.</span>
                <span style="font-weight:600;">${it.name}</span>
                <span style="color:#0984e3;text-align:center;">${qStr}</span>
                <span style="color:#e17055;text-align:right;font-weight:700;">${pStr}</span>
            </div>`;
        }).join('') + `<div style="display:grid;grid-template-columns:1fr 70px;padding:7px 8px;background:#e3f2fd;font-weight:900;font-size:13px;">
            <span style="color:#636e72;">TOTAL</span>
            <span style="color:#0984e3;text-align:right;">₹${dTot.toFixed(2)}</span>
        </div>`;
        html+=`<div style="background:white;margin-bottom:4px;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06);">
            <div class="hist-row" style="cursor:pointer;" onclick="toggleDrop('sd_${h.date.replace(/\//g,'_')}')">
                <span style="font-size:13px;font-weight:700;">${h.date}</span>
                <b style="color:#0984e3;">₹${dTot.toFixed(2)}</b>
                <button class="btn ok-btn" style="font-size:10px;" onclick="event.stopPropagation();openSamanEdit('${h.date}')">EDIT</button>
                <button class="btn del-btn" onclick="event.stopPropagation();delSamanRec('${h.date}')">✕</button>
            </div>
            <div id="sd_${h.date.replace(/\//g,'_')}" style="display:none;">${itemsHTML_s}</div>
        </div>`;
    });
    if(curM) area.innerHTML+=`<div class="month-header"><span style="color:#0984e3;">${curM}</span> <span style="color:#2d3436;">— Total: </span><span style="color:#d63031;">₹${mTot.toFixed(2)}</span></div>`+html;
}
function openSamanEdit(date){
    curSamanDate=date;
    renderSamanEdit();
    showPage('samanEditPage');
}
function renderSamanEdit(){
    let dlabel2=document.getElementById('samanEditDate');
    if(dlabel2) dlabel2.innerText='📅 '+curSamanDate;
    let dp2=document.getElementById('samanDatePicker');
    if(dp2 && curSamanDate){
        let p=curSamanDate.split('/');
        if(p.length===3) dp2.value=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
    }
    document.getElementById('sAddName').value='';
    document.getElementById('sAddQty').value='';
    document.getElementById('sAddPrice').value='';
    let rec=shopping.find(h=>h.date===curSamanDate);
    let area=document.getElementById('sEditList');
    if(!rec||!rec.items.length){
        area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi item nahi. Upar se add karo.</p>";
        document.getElementById('sEditSum').innerText='TOTAL: ₹0';
        return;
    }
    area.innerHTML=rec.items.map((it,i)=>
        `<div style="background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;padding:8px 6px;">
            <div style="display:grid;grid-template-columns:18px 1fr 76px 36px 36px;gap:4px;align-items:center;margin-bottom:4px;">
                <span style="color:#636e72;font-size:11px;">${i+1}.</span>
                <input type="text" value="${it.name}" onchange="sField(${i},'name',this.value)" style="font-size:13px;min-width:0;height:36px;padding:5px;">
                <input type="number" value="${it.price||''}" onchange="sField(${i},'price',this.value)" class="p-box" style="height:36px;" inputmode="decimal">
                <button class="btn del-btn" onclick="sDel(${i})" style="height:36px;">✕</button>
            </div>
        </div>`
    ).join('');
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('sEditSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
}
function sAddItem(){
    let n=document.getElementById('sAddName').value.trim();
    let q=parseFloat(document.getElementById('sAddQty').value)||0;
    let p=parseFloat(document.getElementById('sAddPrice').value)||0;
    if(!n){alert("Naam zaroor bharein!"); return;}
    if(!curSamanDate) curSamanDate=new Date().toLocaleDateString('en-GB');
    let rec=shopping.find(h=>h.date===curSamanDate);
    if(!rec){rec={date:curSamanDate,items:[]};shopping.unshift(rec);}
    rec.items.push({name:n,qty:q,price:p,unit:'Kg'});
    renderSamanEdit();
    save();
}
function sField(i,f,v){
    let rec=shopping.find(h=>h.date===curSamanDate); if(!rec) return;
    if(f==='name'||f==='unit') rec.items[i][f]=v;
    else rec.items[i][f]=parseFloat(v)||0;
    renderSamanEdit(); save();
}
function sDel(i){
    let rec=shopping.find(h=>h.date===curSamanDate);
    if(rec){rec.items.splice(i,1); renderSamanEdit(); save();}
}
function delSamanRec(date){
    if(confirm("Delete record?")){shopping=shopping.filter(h=>h.date!==date);save();renderSamanHist();}
}
function samanHistDateGo(val){ if(!val)return; let p=val.split('-'); openSamanEdit(`${p[2]}/${p[1]}/${p[0]}`); }
function samanDateChanged(val){ if(!val)return; let p=val.split('-'); curSamanDate=`${p[2]}/${p[1]}/${p[0]}`; renderSamanEdit(); }

// ====== DATE & CALCULATION UTILITIES ======
function toggleDrop(id){ let el=document.getElementById(id); el.style.display=el.style.display==='none'?'block':'none'; }
function dateDiff(a,b){ let p1=a.split('/'),p2=b.split('/'); return new Date(p1[2],p1[1]-1,p1[0])-new Date(p2[2],p2[1]-1,p2[0]); }
function dateToMonth(d){ let p=d.split('/'); return months[parseInt(p[1])-1]+" "+p[2]; }

function fmtQtyHi(q,u){
    let n=parseFloat(q)||0; if(!n) return '—';
    if(u==='Kg'||u==='Ltr'){
        if(n===0.5) return u==='Kg'?'आधा किलो':'आधा लीटर';
        if(n===0.25) return '250 ग्राम';
        if(n===0.75) return '750 ग्राम';
    }
    return n+' '+u;
}

function renderMonthlyTotal(){
    let cm=months[new Date().getMonth()]+" "+new Date().getFullYear();
    let total=expense.filter(h=>dateToMonth(h.date)===cm).reduce((sum,h)=>sum+h.items.reduce((s,i)=>s+(parseFloat(i.price)||0),0),0);
    let mBox=document.getElementById('monthlyList');
    if(mBox) mBox.innerHTML=`<span style="font-size:11px;color:#2c3e50;font-weight:bold;">${cm}: ₹${total.toFixed(2)}</span>`;
}
function toggleMonthDrop(){}

// ====== FINAL LIST GENERATION & BILL CALCULATION ======
function showFinalList(){
    let sel=items.filter(i=>i.sel);
    if(!sel.length){alert("Koi item select nahi hai!"); return;}
    showPage('listPage');
    let out=document.getElementById('fOut');
    out.innerHTML=`<h3 style="text-align:center;margin-bottom:10px;">${listLang==='hi'?'सामान सूची':'Shopping List'}</h3>`;
    out.innerHTML+=sel.map((it,i)=>`<div style="padding:6px 0;border-bottom:1px solid #eee;font-size:14px;"><b>${i+1}. ${it.name}</b> — ${it.qty||''} ${it.unit}</div>`).join('');
}
function setLang(l){ listLang=l; document.getElementById('btnHi').classList.toggle('active',l==='hi'); document.getElementById('btnEn').classList.toggle('active',l==='en'); showFinalList(); }
function takeShot(){
    html2canvas(document.getElementById('shotArea')).then(canvas=>{
        let link=document.createElement('a'); link.download='GroceryList.png'; link.href=canvas.toDataURL(); link.click();
    });
}
function openCalc(){
    tCalc=items.filter(i=>i.sel).map(i=>({name:i.name,qty:i.qty,unit:i.unit,price:''}));
    showPage('calcPage');
    renderCalc();
}
function renderCalc(){
    let area=document.getElementById('cList');
    if(!tCalc.length){ area.innerHTML="<p style='padding:20px;text-align:center;'>List khali hai.</p>"; return; }
    area.innerHTML=tCalc.map((it,i)=>`
        <div class="calc-row">
            <span style="font-size:13px;"><b>${it.name}</b> (${it.qty} ${it.unit})</span>
            <input type="number" placeholder="Price" value="${it.price}" onchange="tCalc[${i}].price=this.value;updateCalcSum();" style="width:70px;" inputmode="decimal">
        </div>
    `).join('');
    updateCalcSum();
}
function updateCalcSum(){
    let t=tCalc.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('cSum').innerText=`BILL TOTAL: ₹${t.toFixed(2)}`;
}
</script>
