<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0984e3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;}
        #loadingScreen h2{font-size:22px;margin-bottom:10px;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        input:disabled{background:#f1f2f6;color:#7f8c8d;border:1px dashed #bdc3c7;font-weight:bold;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;width:36px;}
        .ok-btn{background:#2ecc71!important;min-width:36px;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;min-width:36px;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;border-bottom:1px solid #f1f2f6;background:white;margin-bottom:3px;border-radius:8px;}
        .edit-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .calc-row{display:grid;grid-template-columns:1fr 62px 76px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .hist-row{display:grid;grid-template-columns:1fr 82px 40px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:0px;border-radius:8px;border-bottom:1px solid #f1f2f6;cursor:pointer;}
        .sel-bg{background:#fff9db!important;border-left:4px solid #fcc419;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .top-hist{display:flex;gap:8px;padding:8px 10px;flex-shrink:0;}
        .h-box{flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;}
        .month-header{background:#dfe6e9;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;}
        .add-row{background:#e8f5e9;padding:10px 8px;border-radius:8px;border:1px dashed #2ecc71;flex-shrink:0;margin-bottom:8px;}
        .add-row-title{font-size:11px;font-weight:800;color:#27ae60;margin-bottom:6px;}
        .lang-btn{padding:5px 12px;border:2px solid white;border-radius:8px;font-weight:800;font-size:12px;cursor:pointer;background:transparent;color:white;height:34px;}
        .lang-btn.active{background:white;color:#0984e3;}
        
        .hist-detail-panel {
            display: none;
            background: #fff;
            margin: 0 0 8px 0;
            padding: 5px 10px;
            border-radius: 0 0 8px 8px;
            border: 1px solid #eee;
            border-top: none;
        }
        .h-det-line {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 4px 0;
            border-bottom: 1px solid #f9f9f9;
        }
    </style>
</head>
<body>

<div id="loadingScreen"><h2>🛒 Grocery Master</h2><p>Data load ho raha hai...</p></div>

<div id="mainView" style="display:none;">
    <div class="top-hist">
        <div class="h-box" onclick="openHistory('shopping')">📦 Saman History</div>
        <div class="h-box" onclick="openHistory('expense')">💰 Kharch History</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:66px;flex-shrink:0;font-size:11px;">
                <option value="GROCERY">GROC</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')"     id="btn-All"     class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GROC</button>
            <button onclick="setFilter('SABJI')"   id="btn-SABJI"   class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')"    id="btn-BODY"    class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')"   id="btn-OTHER"   class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openKharchAdd()">💸 DAILY KHARCH</button>
    </div>
</div>

<div id="hPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span id="hTitle">History</span>
        <span></span>
    </div>
    <div class="scroll" id="hArea"></div>
</div>

<div id="editPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span id="editTitle">Edit</span>
        <span id="editDateLabel" style="font-size:12px;opacity:0.85;"></span>
    </div>
    <div class="add-row" style="margin:8px;">
        <div class="add-row-title">Add Item</div>
        <div class="in-row">
            <input type="text"   id="eAddName"  style="flex:1;" placeholder="Item ka naam">
            <input type="number" id="eAddQty"   class="u-box" placeholder="Qty"  inputmode="decimal">
            <input type="number" id="eAddPrice" class="p-box" placeholder="₹"    inputmode="decimal">
            <button class="btn" style="background:#2ecc71;width:48px;" onclick="eAddItem()">ADD</button>
        </div>
    </div>
    <div class="scroll" id="eList"></div>
    <div id="eSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="calcPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💰 Bill Calc</span>
        <span></span>
    </div>
    <div class="scroll" id="cList"></div>
    <div id="cSum" class="sum-box">BILL TOTAL: ₹0</div>
</div>

<div id="listPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span id="listTitle">सामान सूची</span>
        <div style="display:flex;gap:5px;">
            <button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button>
            <button class="lang-btn"        id="btnEn" onclick="setLang('en')">ENG</button>
        </div>
    </div>
    <div class="scroll" style="background:#fff;">
        <div id="shotArea" style="padding:18px;background:white;">
            <div id="fOut"></div>
        </div>
    </div>
    <div class="b-nav">
        <button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button>
        <button class="btn" style="background:#2ecc71;flex:1;height:48px;" onclick="openCalc()">💰 CALC</button>
    </div>
</div>

<script>
const firebaseConfig={databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/"};
firebase.initializeApp(firebaseConfig);
const DB=firebase.database().ref('grocery/3');

let items=[],expense=[],shopping=[];
let activeF='All',hType='shopping',tCalc=[];
let currentEditDate='',activePage='main',listLang='hi';
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

DB.get().then(snap=>{
    const d=snap.val();
    if(d){
        items    =toArr(d.items);
        const h  =d.history||{};
        expense  =toArr(h.expense);
        shopping =toArr(h.shopping);
    }
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainView').style.display='flex';
    renderMaster();
}).catch(()=>{
    document.getElementById('loadingScreen').innerHTML='<h2>Error</h2><p>Reload karo</p>';
});

function toArr(x){ return Array.isArray(x)?x:Object.values(x||{}); }
function save(){ DB.set({items,history:{expense,shopping}}); }

function openPage(id){
    activePage=id;
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='none';
    document.getElementById(id).style.display='flex';
    window.history.pushState({p:id},'');
}

function closePage(){ activePage='main'; window.history.back(); }

window.onpopstate=()=>{
    activePage='main';
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='flex';
    renderMaster();
};

function renderMaster(){
    let cont=document.getElementById('masterList'); if(!cont) return;
    let q=document.getElementById('itemName').value.toLowerCase();
    let sortedMaster = [...items].sort((a,b) => (b.sel === a.sel)? 0 : b.sel? 1 : -1);
    let filtered=sortedMaster.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    let n=0;
    cont.innerHTML=filtered.map(it=>{
        let i=items.indexOf(it);
        return `<div class="item-row ${it.sel?'sel-bg':''}">
            <span onclick="toggleI(${i})" style="cursor:pointer;font-size:13px;"><b>${++n}. ${it.name}</b></span>
            <input type="number" value="${it.qty||''}" onchange="items[${i}].qty=this.value;save();" class="u-box" inputmode="decimal">
            <select onchange="items[${i}].unit=this.value;save();" class="unit-sel">
                <option value="Kg"  ${it.unit=='Kg' ?'selected':''}>Kg</option>
                <option value="Pc"  ${it.unit=='Pc' ?'selected':''}>Pc</option>
                <option value="Ltr" ${it.unit=='Ltr'?'selected':''}>Ltr</option>
                <option value="Rs"  ${it.unit=='Rs' ?'selected':''}>Rs</option>
            </select>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})" style="width:22px;height:22px;">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
}

function toggleI(i){ items[i].sel=!items[i].sel; save(); renderMaster(); }

function addItem(){
    let n=document.getElementById('itemName').value.trim(); if(!n) return;
    items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:false,qty:'',unit:'Kg'});
    save(); document.getElementById('itemName').value=''; renderMaster();
}

function delItem(i){ if(confirm("Hata dein?")){ items.splice(i,1); save(); renderMaster(); } }

function setFilter(f){
    activeF=f;
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    let b=document.getElementById('btn-'+f); if(b) b.classList.add('active');
    renderMaster();
}

function unselectAll(){ if(confirm("Sab clear?")){ items.forEach(it=>it.sel=false); save(); renderMaster(); } }

function openKharchAdd(){
    hType='expense';
    let today=new Date().toLocaleDateString('en-GB');
    let rec=expense.find(h=>h.date===today);
    if(!rec){ 
        rec={date:today,items:[]}; 
        expense.unshift(rec); 
        save(); 
    }
    currentEditDate=today;
    // Turant UI update karke edit page kholna
    renderEditList(); 
    openPage('editPage');
    document.getElementById('editTitle').innerText='💰 Kharch Edit';
    document.getElementById('editDateLabel').innerText=currentEditDate;
}

function openHistory(type){
    hType=type;
    openPage('hPage');
    renderH();
}

function getArr(){ return hType==='expense'?expense:shopping; }

function toggleHistDetail(dateId) {
    let el = document.getElementById('det-'+dateId);
    if(el.style.display === 'block') {
        el.style.display = 'none';
    } else {
        el.style.display = 'block';
    }
}

function renderH(){
    let tm={shopping:'📦 Saman History',expense:'💰 Kharch History'};
    document.getElementById('hTitle').innerText=tm[hType];
    let area=document.getElementById('hArea'); area.innerHTML='';
    let arr=getArr();
    let filteredArr = arr.filter(h => h.items && h.items.length > 0);
    let sorted=[...filteredArr].sort((a,b)=>{
        let da=a.date.split('/'),db=b.date.split('/');
        return new Date(db[2],db[1]-1,db[0])-new Date(da[2],da[1]-1,da[0]);
    });
    if(!sorted.length){
        area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi history nahi hai.</p>";
        return;
    }
    let curM='',html='',mTot=0;
    sorted.forEach((h, idx)=>{
        let p=h.date.split('/'),m=months[parseInt(p[1])-1]+' '+p[2];
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        if(curM!==m&&curM!==''){
            area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html;
            html=''; mTot=0;
        }
        curM=m; mTot+=dTot;
        let dateId = h.date.replace(/\//g, '-');
        let itemLines = h.items.map((it, i) => `<div class="h-det-line"><span>${i+1}. ${it.name} (${it.qty||0} ${it.unit||''})</span><b>₹${it.price||0}</b></div>`).join('');
        html+=`<div class="hist-row" onclick="toggleHistDetail('${dateId}')">
            <span style="font-size:13px;">${h.date} ▼</span>
            <b style="color:#0984e3;">₹${dTot.toFixed(2)}</b>
            <div style="display:flex;gap:5px;">
               <button class="btn ok-btn" style="font-size:10px;" onclick="event.stopPropagation(); editH('${h.date}')">EDIT</button>
               <button class="btn del-btn" onclick="event.stopPropagation(); delH('${h.date}')">✕</button>
            </div>
        </div><div class="hist-detail-panel" id="det-${dateId}">${itemLines}</div>`;
    });
    if(curM) area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html;
}

function editH(date){
    currentEditDate=date;
    renderEditList();
    openPage('editPage');
    document.getElementById('editTitle').innerText=hType==='expense'?'💰 Kharch Edit':'📦 Saman Edit';
    document.getElementById('editDateLabel').innerText=currentEditDate;
}

function renderEditList(){
    let arr=getArr();
    let rec=arr.find(h=>h.date===currentEditDate);
    let area=document.getElementById('eList');
    if(!rec||!rec.items.length){
        area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi item nahi. Upar se add karo.</p>";
        document.getElementById('eSum').innerText='TOTAL: ₹0';
        return;
    }
    area.innerHTML=rec.items.map((it,i)=>
        `<div class="edit-grid">
            <span style="color:#636e72;">${i+1}.</span>
            <input type="text" ${it.done?'disabled':''} value="${it.name}" onchange="eField(${i},'name',this.value)" style="font-size:13px;min-width:0;">
            <input type="number" ${it.done?'disabled':''} value="${it.qty||''}" onchange="eField(${i},'qty',this.value)" class="u-box" inputmode="decimal">
            <input type="number" ${it.done?'disabled':''} value="${it.price||''}" onchange="eField(${i},'price',this.value)" class="p-box" inputmode="decimal">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="eLock(${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="eDel(${i})">✕</button>
        </div>`
    ).join('');
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('eSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
}

function eAddItem(){
    let n=document.getElementById('eAddName').value.trim();
    let q=parseFloat(document.getElementById('eAddQty').value)||0;
    let p=parseFloat(document.getElementById('eAddPrice').value)||0;
    if(!n){alert("Naam zaroor bharein!"); return;}
    let arr=getArr();
    let rec=arr.find(h=>h.date===currentEditDate);
    if(!rec){
        rec={date:currentEditDate,items:[]};
        if(hType==='expense') expense.unshift(rec); else shopping.unshift(rec);
    }
    let ex=rec.items.find(e=>e.name.toLowerCase()===n.toLowerCase());
    if(ex){ ex.qty=(parseFloat(ex.qty)||0)+q; ex.price=(parseFloat(ex.price)||0)+p; } 
    else { rec.items.push({name:n,qty:q,price:p,done:false}); }
    document.getElementById('eAddName').value=''; document.getElementById('eAddQty').value=''; document.getElementById('eAddPrice').value='';
    renderEditList(); save();
}

function eField(i,f,v){
    let arr=getArr();
    let rec=arr.find(h=>h.date===currentEditDate); if(!rec) return;
    rec.items[i][f]=(f==='name')?v:(parseFloat(v)||0);
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('eSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
    save();
}

function eLock(i){
    let arr=getArr();
    let rec=arr.find(h=>h.date===currentEditDate); if(!rec) return;
    rec.items[i].done=!rec.items[i].done;
    renderEditList(); save();
}

function eDel(i){
    if(confirm("Delete?")){
        let arr=getArr();
        let rec=arr.find(h=>h.date===currentEditDate);
        if(rec){ rec.items.splice(i,1); renderEditList(); save(); }
    }
}

function delH(date){
    if(confirm("Poora din hataein?")){
        if(hType==='expense') expense=expense.filter(h=>h.date!==date);
        else shopping=shopping.filter(h=>h.date!==date);
        save(); renderH();
    }
}

function setLang(lang){
    listLang=lang;
    let hi=document.getElementById('btnHi'), en=document.getElementById('btnEn');
    if(lang==='hi'){ hi.classList.add('active'); en.classList.remove('active'); } 
    else { en.classList.add('active'); hi.classList.remove('active'); }
    renderFinalList();
}

function fmtQty(qty,unit,lang){
    let q=parseFloat(qty);
    if(isNaN(q)||qty===''||qty===undefined) return '';
    let isHalf=(Math.abs(q-0.5)<0.001), is200=(Math.abs(q-0.2)<0.001), is250=(Math.abs(q-0.25)<0.001), is100=(Math.abs(q-0.1)<0.001), is750=(Math.abs(q-0.75)<0.001);
    if(lang==='en'){
        if(unit==='Kg'){ if(isHalf) return 'Half Kg'; if(is200) return '200 Gram'; if(is250) return '250 Gram'; if(is100) return '100 Gram'; if(is750) return '750 Gram'; return `${q} Kg`; }
        if(unit==='Ltr'){ if(isHalf) return 'Half Litre'; if(is200) return '200 ML'; if(is250) return '250 ML'; if(is100) return '100 ML'; if(is750) return '750 ML'; return `${q} Litre`; }
        return `${q} ${unit}`;
    }
    if(unit==='Kg'){ if(isHalf) return 'आधा किलो'; if(is200) return '200 ग्राम'; if(is250) return '250 ग्राम'; if(is100) return '100 ग्राम'; if(is750) return '750 ग्राम'; return `${q} किलो`; }
    if(unit==='Ltr'){ if(isHalf) return 'आधा लीटर'; if(is200) return '200 ML'; if(is250) return '250 ML'; if(is100) return '100 ML'; if(is750) return '750 ML'; return `${q} लीटर`; }
    return `${qty} ${unit==='Pc'?'पीस':unit==='Rs'?'रुपये':unit}`;
}

function catLabel(c,lang){
    if(lang==='hi'){
        if(c==='GROCERY') return 'GROC'; if(c==='SABJI') return 'सब्जी'; if(c==='BODY') return 'शरीर'; if(c==='OTHER') return 'अन्य';
    }
    return c;
}

let lastSelItems=[];
function showFinalList(){
    lastSelItems=items.filter(it=>it.sel);
    if(!lastSelItems.length){alert("Pehle item choose karo!"); return;}
    renderFinalList(); openPage('listPage');
}

function renderFinalList(){
    let isHi=(listLang==='hi');
    let out=document.getElementById('fOut'); if(!out) return;
    out.innerHTML=`<h2 style="text-align:center;color:#0984e3;border-bottom:3px solid #0984e3;padding-bottom:10px;margin-bottom:15px;">${isHi?'🛒 सामान सूची':'🛒 Shopping List'}</h2>`;
    ['GROCERY','SABJI','BODY','OTHER'].forEach(c=>{
        let f=lastSelItems.filter(it=>it.cat===c); if(!f.length) return;
        out.innerHTML+=`<div style="background:#2d3436;color:#fff;padding:5px 12px;border-radius:4px;font-size:12px;margin:14px 0 7px;display:inline-block;">${catLabel(c,listLang)}</div>`;
        out.innerHTML+=`<div style="display:grid;grid-template-columns:1fr 110px 70px;font-size:11px;font-weight:900;color:#636e72;padding:5px;border-bottom:2px solid #dfe6e9;"><span>${isHi?'सामान':'ITEM'}</span><span style="text-align:center;">${isHi?'मात्रा':'QTY'}</span><span style="text-align:center;">${isHi?'कीमत':'RATE'}</span></div>`;
        f.forEach((it,j)=>{ out.innerHTML+=`<div style="display:grid;grid-template-columns:1fr 110px 70px;padding:11px 5px;border-bottom:1px dashed #ccc;font-weight:bold;align-items:center;"><span style="font-size:13px;">${j+1}. ${it.name}</span><span style="text-align:center;color:#0984e3;font-size:13px;">${fmtQty(it.qty,it.unit,listLang)}</span><span style="text-align:center;color:#e17055;font-size:13px;">₹____</span></div>`; });
    });
}

function openCalc(){
    tCalc=items.filter(it=>it.sel).map(it=>({name:it.name,qty:parseFloat(it.qty)||0,unit:it.unit,price:0,done:false}));
    renderC(); openPage('calcPage');
}
function renderC(){
    document.getElementById('cList').innerHTML=tCalc.map((it,i)=>
        `<div class="calc-row"><b style="font-size:13px;">${it.name}</b><span style="color:#636e72;font-size:12px;">${it.qty} ${it.unit}</span><input type="number" ${it.done?'disabled':''} placeholder="₹ Rate" value="${it.price>0?it.price:''}" onchange="calcPrice(${i},this.value)" class="p-box" inputmode="decimal"><button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="calcLock(${i})">${it.done?'✓':'🔒'}</button></div>`
    ).join('');
    renderCSum();
}
function calcPrice(i,v){ tCalc[i].price=parseFloat(v)||0; renderCSum(); autoSaveCalc(); }
function calcLock(i){ tCalc[i].done=!tCalc[i].done; renderC(); autoSaveCalc(); }
function autoSaveCalc(){
    let readyItems=tCalc.filter(it=>it.done); if(!readyItems.length) return;
    let d=new Date().toLocaleDateString('en-GB');
    let rec=shopping.find(h=>h.date===d);
    if(!rec){ rec={date:d,items:[]}; shopping.unshift(rec); }
    readyItems.forEach(ni=>{
        let ex=rec.items.find(e=>e.name.toLowerCase()===ni.name.toLowerCase());
        if(ex){ ex.qty=ni.qty; ex.price=ni.price; } else { rec.items.push({name:ni.name,qty:ni.qty,unit:ni.unit,price:ni.price,done:true}); }
    });
    save();
}
function renderCSum(){ let t=tCalc.reduce((a,b)=>a+(parseFloat(b.price)||0),0); document.getElementById('cSum').innerText=`BILL TOTAL: ₹${t.toFixed(2)}`; }
function takeShot(){ html2canvas(document.getElementById('shotArea')).then(c=>{ let a=document.createElement('a'); a.download='SamanList.png'; a.href=c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
