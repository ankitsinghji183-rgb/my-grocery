<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Professional v30</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #d93025; --gray: #5f6368; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f8f9fa; margin: 0; padding: 0; color: #3c4043; }

        /* Professional Header */
        .header-fixed { position: sticky; top: 0; background: white; z-index: 1000; border-bottom: 1px solid #dadce0; }
        .top-nav { display: flex; gap: 6px; padding: 8px; }
        .nav-btn { flex: 1; padding: 10px; border: none; border-radius: 6px; color: white; font-weight: 600; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        
        .input-group { display: flex; gap: 4px; padding: 8px; background: #fff; }
        input, select { height: 38px; border: 1px solid #dadce0; border-radius: 4px; font-size: 14px; padding: 0 8px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: inset 0 0 0 1px var(--primary); }
        
        .filter-bar { display: flex; gap: 5px; padding: 8px; overflow-x: auto; background: #fff; scrollbar-width: none; }
        .f-btn { background: #f1f3f4; color: #3c4043; padding: 6px 12px; border-radius: 16px; font-size: 11px; border: 1px solid #dadce0; font-weight: 500; white-space: nowrap; }
        .f-active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Master List styling */
        .list-wrap { padding-bottom: 80px; }
        .item-row { display: flex; align-items: center; padding: 10px 12px; background: white; border-bottom: 1px solid #f1f3f4; transition: 0.2s; }
        .selected-row { background: #e8f0fe !important; }
        .item-name { flex: 1; font-weight: 700; font-size: 15px; color: #202124; }
        .qty-input { width: 50px; margin-right: 4px; text-align: left; }
        .unit-select { width: 65px; background: #fff; font-size: 12px; }

        /* Full Screen Pages */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8f9fa; z-index: 2000; display: none; flex-direction: column; }
        .page-header { background: white; color: #202124; display: flex; align-items: center; padding: 14px; font-weight: 600; border-bottom: 1px solid #dadce0; }
        .back-link { color: var(--primary); cursor: pointer; padding-right: 15px; font-weight: bold; }
        .scroll-content { flex: 1; overflow-y: auto; padding: 10px; }

        /* Grid for Calc & Kharch - Line format */
        .data-grid { display: grid; grid-template-columns: 25px 1fr 50px 70px 40px; gap: 6px; background: white; margin-bottom: 4px; padding: 8px; border-radius: 6px; align-items: center; border: 1px solid #e0e0e0; }
        .price-field { width: 100%; border: 1px solid #ccc; padding: 6px 4px; font-weight: 900; border-radius: 4px; }
        .confirm-btn { font-size: 9px; text-align: center; padding: 6px 2px; border-radius: 4px; border: 1px solid #ddd; font-weight: bold; }
        .is-done { background: var(--success); color: white; border: none; }

        /* Bottom Sticky */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; display: flex; gap: 8px; padding: 12px; background: white; border-top: 1px solid #dadce0; }
        .btn-main { flex: 1; padding: 16px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 14px; elevation: 2; }
        .total-banner { background: #202124; color: white; padding: 14px; font-weight: 700; text-align: right; font-size: 18px; }
    </style>
</head>
<body>

<div id="toast" style="position:fixed;top:10px;right:10px;background:#323232;color:white;padding:8px 16px;border-radius:4px;font-size:12px;display:none;z-index:9999;">SAVED</div>

<div class="main-app">
    <div class="header-fixed">
        <div class="top-nav">
            <button class="nav-btn" style="background:#673ab7" onclick="openHistory('shopping')">Item Hist</button>
            <button class="nav-btn" style="background:#009688" onclick="openHistory('expense')">Kharch Hist</button>
        </div>
        <div class="input-group">
            <input type="text" id="itemName" placeholder="Add Item Name..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:80px;"><option value="GROCERY">GROC</option><option value="SABJI">SABJI</option><option value="OTHER">MISC</option></select>
            <button class="nav-btn" style="background:var(--success); flex:none; width:55px;" onclick="addItem()">ADD</button>
        </div>
        <div class="filter-bar">
            <button class="f-btn f-active" onclick="setFilter('All', this)">ALL</button>
            <button class="f-btn" onclick="setFilter('GROCERY', this)">GROC</button>
            <button class="f-btn" onclick="setFilter('SABJI', this)">SABJI</button>
            <button class="f-btn" onclick="setFilter('OTHER', this)">OTHER</button>
            <button class="f-btn" style="color:var(--danger)" onclick="clearSelection()">CLEAR</button>
            <button class="f-btn" id="langBtn" onclick="toggleLang()">EN</button>
        </div>
    </div>

    <div id="masterList" class="list-wrap"></div>

    <div class="sticky-footer">
        <button class="btn-main" style="background:var(--primary)" onclick="generateShoppingList()">SHOPPING LIST</button>
        <button class="btn-main" style="background:#f29900" onclick="openKharchPage()">DAILY KHARCH</button>
    </div>
</div>

<div id="listPage" class="full-page">
    <div class="page-header"><span class="back-link" onclick="closePage('listPage')">BACK</span> FINAL SHOPPING LIST</div>
    <div class="scroll-content" id="captureArea" style="background:white;"><div id="listPrint"></div></div>
    <div class="sticky-footer">
        <button class="btn-main" style="background:#673ab7" onclick="downloadPhoto()">PHOTO</button>
        <button class="btn-main" style="background:var(--success)" onclick="openCalculation()">CALCULATION</button>
    </div>
</div>

<div id="calcPage" class="full-page">
    <div class="page-header"><span class="back-link" onclick="closePage('calcPage')">BACK</span> CALCULATION</div>
    <div class="scroll-content" id="calcList"></div>
    <div class="total-banner" id="calcGrandTotal">TOTAL: ₹0</div>
</div>

<div id="kharchPage" class="full-page">
    <div class="page-header"><span class="back-link" onclick="closePage('kharchPage')">BACK</span> DAILY KHARCH</div>
    <div class="input-group" style="border-bottom:1px solid #ddd;">
        <input type="text" id="khName" placeholder="Item..." style="flex:1.5;">
        <input type="text" id="khQty" placeholder="Qty" style="flex:0.7;">
        <input type="number" id="khPrice" placeholder="Rs" style="flex:0.8;">
        <button class="nav-btn" style="background:var(--primary); flex:none; width:50px;" onclick="addQuickKharch()">ADD</button>
    </div>
    <div class="scroll-content" id="kharchList"></div>
    <div class="total-banner" id="kharchGrandTotal">TOTAL: ₹0</div>
</div>

<div id="historyPage" class="full-page">
    <div class="page-header"><span class="back-link" onclick="closePage('historyPage')">BACK</span> <span id="histTitle">HISTORY</span></div>
    <div style="padding:8px;"><input type="text" id="histSearch" placeholder="Search by Date (DD-MM)..." style="width:100%;" oninput="renderHistoryItems()"></div>
    <div class="scroll-content" id="histEntries"></div>
</div>

<script>
    const dbURL = "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/";
    let items = [], historyData = { shopping: {}, expense: {} }, curFilter = 'All', activeHistType = 'shopping';

    async function sync(path, method='PUT', body=null) {
        showToast();
        await fetch(`${dbURL}${path}.json`, { method, body: body ? JSON.stringify(body) : null });
    }

    function showToast() { let t=document.getElementById('toast'); t.style.display='block'; setTimeout(()=>t.style.display='none',800); }

    window.onload = async () => {
        let r = await fetch(dbURL + ".json");
        let d = await r.json();
        if(d) { items = d.items || []; historyData = d.history || {shopping:{}, expense:{}}; }
        renderMaster();
    };

    window.onpopstate = () => document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    function openPage(id) { document.getElementById(id).style.display='flex'; window.history.pushState({v:id}, ''); }
    function closePage(id) { document.getElementById(id).style.display='none'; }

    // Core Logic
    function addItem() {
        let n = document.getElementById('itemName').value;
        let c = document.getElementById('catSelect').value;
        if(n) { items.unshift({name:n, cat:c, selected:false, qty:'', unit:'Kg'}); sync('items','PUT',items); renderMaster(); document.getElementById('itemName').value=''; }
    }

    function renderMaster() {
        let list = document.getElementById('masterList');
        let search = document.getElementById('itemName').value.toLowerCase();
        let sorted = [...items].sort((a,b)=> (b.selected-a.selected));
        list.innerHTML = sorted.map((it) => {
            let i = items.indexOf(it);
            if(curFilter!=='All' && it.cat!==curFilter) return '';
            if(search && !it.name.toLowerCase().includes(search)) return '';
            return `<div class="item-row ${it.selected?'selected-row':''}">
                <span class="item-name" onclick="togglePick(${i})">${it.name}</span>
                <input type="number" class="qty-input" value="${it.qty}" oninput="items[${i}].qty=this.value; sync('items','PUT',items)">
                <select class="unit-select" onchange="items[${i}].unit=this.value; sync('items','PUT',items)">
                    <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option><option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option>
                </select>
                <input type="checkbox" ${it.selected?'checked':''} onclick="togglePick(${i})" style="width:18px;height:18px;margin-left:10px;">
            </div>`;
        }).join('');
    }

    function togglePick(i) { items[i].selected = !items[i].selected; sync('items','PUT',items); renderMaster(); }
    function setFilter(f, btn) { curFilter = f; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('f-active')); btn.classList.add('f-active'); renderMaster(); }
    function clearSelection() { if(confirm("Clear current list?")) { items.forEach(it=>it.selected=false); sync('items','PUT',items); renderMaster(); } }

    // Final Shopping Screen
    function generateShoppingList() {
        let sel = items.filter(it=>it.selected);
        if(!sel.length) return alert("Select items first!");
        let h = '<h2 style="text-align:center;padding:10px;border-bottom:2px solid #000;">SHOPPING LIST</h2>';
        ['GROCERY','SABJI','OTHER'].forEach(cat => {
            let filtered = sel.filter(it=>it.cat===cat);
            if(filtered.length) {
                h += `<div style="background:#eee;padding:6px;font-weight:bold;">${cat}</div>` + filtered.map((it, idx)=>
                `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed #ccc;font-size:15px;">
                <span>${idx+1}. ${it.name}</span><b>${it.qty} ${it.unit}</b><span style="border-bottom:2px solid #000;width:50px"></span></div>`).join('');
            }
        });
        document.getElementById('listPrint').innerHTML = h; openPage('listPage');
    }

    // Calculation & History (Single Date Merge)
    function openCalculation(dKey = null) {
        let date = dKey || new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = dKey ? historyData.shopping[dKey] : items.filter(it=>it.selected).map(it=>({...it, price:0, done:false}));
        if(!dKey && historyData.shopping[date]) list = [...historyData.shopping[date], ...list];
        historyData.shopping[date] = list;
        sync(`history/shopping/${date}`, 'PUT', list);
        renderCalcScreen(date); openPage('calcPage');
    }

    function renderCalcScreen(date) {
        let list = historyData.shopping[date], h = '', grand = 0;
        ['GROCERY','SABJI','OTHER'].forEach(cat => {
            let filtered = list.filter(it=>it.cat===cat);
            if(filtered.length) {
                let sub = 0; h += `<div style="color:var(--primary);font-weight:bold;padding:10px 0 5px 0;">${cat}</div>`;
                filtered.forEach((it, idx) => {
                    let p = parseFloat(it.price)||0; sub+=p; grand+=p;
                    h += `<div class="data-grid"><span>${idx+1}</span><div style="font-size:13px;"><b>${it.name}</b><br><small>${it.qty}${it.unit}</small></div>
                    <input type="number" class="price-field" value="${it.price||''}" oninput="editHist('shopping','${date}',${list.indexOf(it)},this.value)">
                    <div class="confirm-btn ${it.done?'is-done':''}" onclick="markDone('shopping','${date}',${list.indexOf(it)})">${it.done?'DONE':'CONF'}</div>
                    <span style="color:var(--danger);text-align:center;font-size:12px;" onclick="delRow('shopping','${date}',${list.indexOf(it)})">DEL</span></div>`;
                });
                h += `<div style="text-align:right;font-size:12px;font-weight:bold;margin-bottom:10px;">Sub: ₹${sub}</div>`;
            }
        });
        document.getElementById('calcList').innerHTML = h; document.getElementById('calcGrandTotal').innerText = `TOTAL: ₹${grand}`;
    }

    // Daily Kharch Screen
    function openKharchPage() { renderKharchScreen(); openPage('kharchPage'); }
    function addQuickKharch() {
        let n=document.getElementById('khName').value, q=document.getElementById('khQty').value, p=document.getElementById('khPrice').value;
        if(!n || !p) return;
        let date = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = historyData.expense[date] || [];
        list.push({name:n, qty:q, price:p});
        historyData.expense[date] = list;
        sync(`history/expense/${date}`, 'PUT', list);
        renderKharchScreen(); 
        document.getElementById('khName').value=''; document.getElementById('khQty').value=''; document.getElementById('khPrice').value='';
    }

    function renderKharchScreen(dKey = null) {
        let date = dKey || new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = historyData.expense[date] || [], h = '', total = 0;
        list.forEach((it, i) => {
            total += parseFloat(it.price)||0;
            h += `<div class="data-grid" style="grid-template-columns: 25px 1fr 50px 70px 40px;">
                <span>${i+1}</span><div><b>${it.name}</b> <small>${it.qty}</small></div><span></span>
                <input type="number" class="price-field" value="${it.price}" oninput="editHist('expense','${date}',${i},this.value)">
                <span style="color:var(--danger);font-weight:bold;text-align:center;font-size:12px;" onclick="delRow('expense','${date}',${i})">DEL</span>
            </div>`;
        });
        document.getElementById('kharchList').innerHTML = h;
        document.getElementById('kharchGrandTotal').innerText = `TOTAL: ₹${total}`;
    }

    // Common History Functions
    function editHist(type, date, i, v) { historyData[type][date][i].price = v; sync(`history/${type}/${date}`, 'PUT', historyData[type][date]); type==='shopping'?renderCalcScreen(date):renderKharchScreen(date); }
    function markDone(type, date, i) { historyData[type][date][i].done = !historyData[type][date][i].done; sync(`history/${type}/${date}`, 'PUT', historyData[type][date]); renderCalcScreen(date); }
    function delRow(type, date, i) { if(confirm("Delete this?")) { historyData[type][date].splice(i,1); sync(`history/${type}/${date}`, 'PUT', historyData[type][date]); type==='shopping'?renderCalcScreen(date):renderKharchScreen(date); } }

    function openHistory(type) {
        activeHistType = type; document.getElementById('histTitle').innerText = type==='shopping'?'ITEM HISTORY':'KHARCH HISTORY';
        renderHistoryItems(); openPage('historyPage');
    }
    function renderHistoryItems() {
        let search = document.getElementById('histSearch').value, data = historyData[activeHistType], h = '';
        Object.keys(data).reverse().forEach(date => {
            if(search && !date.includes(search)) return;
            let total = data[date].reduce((acc, x)=> acc+(parseFloat(x.price)||0), 0);
            h += `<div class="item-row" style="justify-content:space-between;border:1px solid #ddd;margin-bottom:5px;border-radius:6px;">
                <span onclick="${activeHistType==='shopping'?'openCalculation':'renderKharchScreen'}('${date}')" style="flex:1;"><b>${date.replace(/-/g,'/')}</b></span>
                <b style="color:var(--success)">₹${total}</b>
                <span style="color:var(--danger);margin-left:15px;font-size:11px;font-weight:bold;" onclick="deleteFullDate('${activeHistType}','${date}')">DELETE</span>
            </div>`;
        });
        document.getElementById('histEntries').innerHTML = h;
    }
    function deleteFullDate(type, date) { if(confirm("Delete entire day record?")) { delete historyData[type][date]; api(`history/${type}/${date}`, 'DELETE'); renderHistoryItems(); } }

    function downloadPhoto() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            let link = document.createElement('a'); link.download = `List_${new Date().toLocaleDateString()}.png`;
            link.href = canvas.toDataURL(); link.click();
        });
    }
    function toggleLang() { let b=document.getElementById('langBtn'); b.innerText = (b.innerText==='EN'?'HI':'EN'); }
</script>
</body>
</html>
