<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Pro v31</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #d93025; }
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f6f9; margin: 0; padding: 0; }

        /* Header & Inputs */
        .header { position: sticky; top: 0; background: white; z-index: 100; border-bottom: 1px solid #ddd; padding: 5px; }
        .row-top { display: flex; gap: 4px; margin-bottom: 5px; }
        .btn-n { flex: 1; padding: 8px; border: none; border-radius: 4px; color: white; font-weight: bold; font-size: 11px; }
        
        .input-box { display: flex; gap: 2px; padding: 2px 5px; }
        input, select { height: 32px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; padding-left: 5px; }
        input:focus { border-color: var(--primary); outline: none; }

        /* Master List */
        .item-row { display: flex; align-items: center; padding: 8px; background: white; border-bottom: 1px solid #eee; }
        .sel { background: #e8f0fe !important; }
        .name-txt { flex: 1; font-weight: bold; font-size: 14px; }
        .q-in { width: 40px; margin-right: 2px; }
        .u-sel { width: 50px; font-size: 11px; }

        /* Full Pages */
        .page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 500; display: none; flex-direction: column; }
        .p-head { background: #eee; padding: 12px; font-weight: bold; display: flex; align-items: center; border-bottom: 1px solid #ccc; }
        .p-body { flex: 1; overflow-y: auto; padding: 8px; }

        /* Grid Layout for Calculation & Kharch */
        .grid-line { display: grid; grid-template-columns: 25px 1fr 45px 65px 35px; gap: 4px; align-items: center; background: white; padding: 6px; margin-bottom: 2px; border: 1px solid #eee; border-radius: 4px; }
        .price-in { width: 100%; border: 1px solid #aaa; padding: 4px; font-weight: bold; text-align: left; background: #fffde7; }
        .done-btn { font-size: 9px; text-align: center; padding: 5px 0; border-radius: 3px; background: #f0f0f0; border: 1px solid #ccc; }
        .is-done { background: var(--success); color: white; border: none; }

        /* Bottom Bar */
        .footer { position: fixed; bottom: 0; width: 100%; display: flex; gap: 5px; padding: 8px; background: white; border-top: 1px solid #ddd; }
        .btn-f { flex: 1; padding: 12px; border: none; border-radius: 5px; color: white; font-weight: bold; font-size: 14px; }
        .total-strip { background: #333; color: white; padding: 10px; text-align: right; font-weight: bold; }
    </style>
</head>
<body>

<div id="syncStatus" style="position:fixed; top:5px; right:5px; background:var(--success); color:white; padding:2px 8px; border-radius:10px; font-size:10px; display:none; z-index:2000;">SYNCED</div>

<div class="main-ui">
    <div class="header">
        <div class="row-top">
            <button class="btn-n" style="background:#673ab7" onclick="openHistory('shopping')">ITEM HIST</button>
            <button class="btn-n" style="background:#009688" onclick="openHistory('expense')">KHARCH HIST</button>
        </div>
        <div class="input-box">
            <input type="text" id="itemName" placeholder="Item Name..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect"><option value="GROCERY">GROC</option><option value="SABJI">SABJI</option><option value="OTHER">MISC</option></select>
            <button class="btn-n" style="background:var(--success); flex:none; width:50px;" onclick="addItem()">ADD</button>
        </div>
    </div>

    <div id="masterList" style="padding-bottom:70px;"></div>

    <div class="footer">
        <button class="btn-f" style="background:var(--primary)" onclick="showFinalList()">SHOPPING LIST</button>
        <button class="btn-f" style="background:#f29900" onclick="openKharchPage()">DAILY KHARCH</button>
    </div>
</div>

<div id="listPage" class="page">
    <div class="p-head"><span onclick="closePage('listPage')" style="color:blue;margin-right:15px;">BACK</span> FINAL LIST</div>
    <div class="p-body" id="captureArea"><div id="listPrint"></div></div>
    <div class="footer">
        <button class="btn-f" style="background:#673ab7" onclick="downloadPhoto()">PHOTO</button>
        <button class="btn-f" style="background:var(--success)" onclick="openCalculation()">CALCULATION</button>
    </div>
</div>

<div id="calcPage" class="page">
    <div class="p-head"><span onclick="closePage('calcPage')" style="color:blue;margin-right:15px;">BACK</span> CALCULATION</div>
    <div class="p-body" id="calcContent"></div>
    <div class="total-strip" id="calcTotal">Total: ₹0</div>
</div>

<div id="kharchPage" class="page">
    <div class="p-head"><span onclick="closePage('kharchPage')" style="color:blue;margin-right:15px;">BACK</span> DAILY KHARCH</div>
    <div class="input-box" style="padding:10px; border-bottom:1px solid #ddd;">
        <input type="text" id="kName" placeholder="Item..." style="flex:1.5;">
        <input type="text" id="kQty" placeholder="Qty" style="flex:0.7;">
        <input type="number" id="kPrice" placeholder="Rs" style="flex:0.8;">
        <button class="btn-n" style="background:var(--primary); flex:none; width:50px;" onclick="addKharch()">ADD</button>
    </div>
    <div class="p-body" id="kharchContent"></div>
    <div class="total-strip" id="kharchTotal">Total: ₹0</div>
</div>

<div id="histPage" class="page">
    <div class="p-head"><span onclick="closePage('histPage')" style="color:blue;margin-right:15px;">BACK</span> <span id="hTitle">HISTORY</span></div>
    <div class="p-body" id="histEntries"></div>
</div>

<script>
    const db = "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/";
    let items = [], history = { shopping: {}, expense: {} }, saveTimer;

    async function sync(path, data) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(async () => {
            document.getElementById('syncStatus').style.display='block';
            await fetch(`${db}${path}.json`, { method:'PUT', body: JSON.stringify(data) });
            setTimeout(()=>document.getElementById('syncStatus').style.display='none', 800);
        }, 2000); // 2 Second wait before saving
    }

    window.onload = async () => {
        let r = await fetch(db + ".json");
        let d = await r.json();
        if(d) { items = d.items || []; history = d.history || {shopping:{}, expense:{}}; }
        renderMaster();
    };

    function openPage(id) { document.getElementById(id).style.display='flex'; window.history.pushState({v:id},''); }
    function closePage(id) { document.getElementById(id).style.display='none'; }
    window.onpopstate = () => document.querySelectorAll('.page').forEach(p=>p.style.display='none');

    // Add Item with Merge Logic
    function addItem() {
        let n = document.getElementById('itemName').value;
        let c = document.getElementById('catSelect').value;
        if(!n) return;
        let existing = items.find(it => it.name.toLowerCase() === n.toLowerCase());
        if(existing) {
            existing.selected = true;
        } else {
            items.unshift({name:n, cat:c, selected:true, qty:'', unit:'Kg'});
        }
        sync('items', items); renderMaster(); document.getElementById('itemName').value='';
    }

    function renderMaster() {
        let html = '', search = document.getElementById('itemName').value.toLowerCase();
        let sorted = [...items].sort((a,b)=> b.selected - a.selected);
        sorted.forEach(it => {
            let i = items.indexOf(it);
            if(search && !it.name.toLowerCase().includes(search)) return;
            html += `<div class="item-row ${it.selected?'sel':''}">
                <span class="name-txt" onclick="togglePick(${i})">${it.name}</span>
                <input type="number" class="q-in" value="${it.qty}" oninput="items[${i}].qty=this.value; sync('items',items)">
                <select class="u-sel" onchange="items[${i}].unit=this.value; sync('items',items)">
                    <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option><option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option>
                </select>
                <input type="checkbox" ${it.selected?'checked':''} onclick="togglePick(${i})" style="margin-left:10px;">
            </div>`;
        });
        document.getElementById('masterList').innerHTML = html;
    }
    function togglePick(i) { items[i].selected = !items[i].selected; sync('items', items); renderMaster(); }

    // Shopping List Screen
    function showFinalList() {
        let sel = items.filter(it=>it.selected), h = '<h2 style="text-align:center;">SHOPPING LIST</h2>';
        ['GROCERY','SABJI','OTHER'].forEach(c => {
            let f = sel.filter(it=>it.cat===c);
            if(f.length) {
                h += `<div style="background:#eee;padding:5px;font-weight:bold;">${c}</div>` + f.map((it, idx)=>
                `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px dashed #ccc;">
                <span>${idx+1}. ${it.name}</span><b>${it.qty}${it.unit}</b><span style="border-bottom:2px solid #000;width:50px"></span></div>`).join('');
            }
        });
        document.getElementById('listPrint').innerHTML = h; openPage('listPage');
    }

    // Calculation & History Edit
    function openCalculation(dKey = null) {
        let date = dKey || new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = dKey ? history.shopping[dKey] : items.filter(it=>it.selected).map(it=>({...it, price:0, done:false}));
        if(!dKey && history.shopping[date]) {
            // Merge into existing date
            list.forEach(newItem => {
                let old = history.shopping[date].find(x => x.name === newItem.name);
                if(!old) history.shopping[date].push(newItem);
            });
            list = history.shopping[date];
        }
        history.shopping[date] = list; sync(`history/shopping/${date}`, list);
        renderCalc(date); openPage('calcPage');
    }

    function renderCalc(date) {
        let list = history.shopping[date], h = '', g = 0;
        ['GROCERY','SABJI','OTHER'].forEach(c => {
            let f = list.filter(it=>it.cat===c);
            if(f.length) {
                let s = 0; h += `<b style="color:blue;">${c}</b>`;
                f.forEach((it, idx) => {
                    let p = parseFloat(it.price)||0; s+=p; g+=p;
                    h += `<div class="grid-line"><span>${idx+1}</span><div><b>${it.name}</b><br><small>${it.qty}${it.unit}</small></div>
                    <input type="number" class="price-in" value="${it.price||''}" oninput="editVal('shopping','${date}',${list.indexOf(it)},this.value)">
                    <div class="done-btn ${it.done?'is-done':''}" onclick="markDone('${date}',${list.indexOf(it)})">${it.done?'DONE':'CONF'}</div>
                    <span style="color:red;font-size:10px;" onclick="delRow('shopping','${date}',${list.indexOf(it)})">DEL</span></div>`;
                });
                h += `<div style="text-align:right;font-size:12px;margin-bottom:8px;">Sub: ₹${s}</div>`;
            }
        });
        document.getElementById('calcContent').innerHTML = h; document.getElementById('calcTotal').innerText = `Total: ₹${g}`;
    }

    // Daily Kharch
    function openKharchPage() { renderKharch(); openPage('kharchPage'); }
    function addKharch() {
        let n=document.getElementById('kName').value, q=document.getElementById('kQty').value, p=document.getElementById('kPrice').value;
        if(!n || !p) return;
        let date = new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = history.expense[date] || [];
        list.push({name:n, qty:q, price:p});
        history.expense[date] = list; sync(`history/expense/${date}`, list);
        renderKharch(date); document.getElementById('kName').value=''; document.getElementById('kQty').value=''; document.getElementById('kPrice').value='';
    }
    function renderKharch(dKey = null) {
        let date = dKey || new Date().toLocaleDateString('en-GB').replace(/\//g,'-');
        let list = history.expense[date] || [], h = '', t = 0;
        list.forEach((it, i) => {
            t += parseFloat(it.price)||0;
            h += `<div class="grid-line" style="grid-template-columns: 25px 1fr 45px 70px 40px;">
                <span>${i+1}</span><b>${it.name} <small>${it.qty}</small></b><span></span>
                <input type="number" class="price-in" value="${it.price}" oninput="editVal('expense','${date}',${i},this.value)">
                <span style="color:red;font-weight:bold;font-size:10px;" onclick="delRow('expense','${date}',${i})">DEL</span></div>`;
        });
        document.getElementById('kharchContent').innerHTML = h; document.getElementById('kharchTotal').innerText = `Total: ₹${t}`;
    }

    // History Logic
    function editVal(type, date, i, v) { history[type][date][i].price = v; sync(`history/${type}/${date}`, history[type][date]); }
    function markDone(date, i) { history.shopping[date][i].done = !history.shopping[date][i].done; sync(`history/shopping/${date}`, history.shopping[date]); renderCalc(date); }
    function delRow(type, date, i) { if(confirm("Delete?")) { history[type][date].splice(i,1); sync(`history/${type}/${date}`, history[type][date]); type==='shopping'?renderCalc(date):renderKharch(date); } }

    function openHistory(type) {
        activeType = type; document.getElementById('hTitle').innerText = type.toUpperCase() + ' HISTORY';
        renderHistList(); openPage('histPage');
    }
    function renderHistList() {
        let data = history[activeType], h = '';
        Object.keys(data).reverse().forEach(date => {
            let total = data[date].reduce((acc, x)=> acc+(parseFloat(x.price)||0), 0);
            h += `<div class="item-row" style="justify-content:space-between;border:1px solid #ddd;margin-bottom:5px;">
                <span onclick="${activeType==='shopping'?'openCalculation':'renderKharch'}('${date}')" style="flex:1;"><b>${date.replace(/-/g,'/')}</b></span>
                <b style="color:green">₹${total}</b>
                <span style="color:red;margin-left:15px;font-size:11px;" onclick="deleteDay('${activeType}','${date}')">DEL</span>
            </div>`;
        });
        document.getElementById('histEntries').innerHTML = h;
    }
    function deleteDay(type, date) { if(confirm("Delete all?")) { delete history[type][date]; sync(`history/${type}/${date}`, null); renderHistList(); } }

    function downloadPhoto() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            let link = document.createElement('a'); link.download = `List_${new Date().toLocaleDateString()}.png`;
            link.href = canvas.toDataURL(); link.click();
        });
    }
</script>
</body>
</html>
