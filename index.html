<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        input:disabled{background:#f1f2f6;color:#7f8c8d;border:1px dashed #bdc3c7;font-weight:bold;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;width:36px;}
        .ok-btn{background:#2ecc71!important;min-width:36px;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;min-width:36px;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;border-bottom:1px solid #f1f2f6;background:white;margin-bottom:3px;border-radius:8px;}
        .dk-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .edit-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .calc-row{display:grid;grid-template-columns:1fr 62px 76px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .hist-row{display:grid;grid-template-columns:1fr 82px 40px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .sel-bg{background:#fff9db!important;border-left:4px solid #fcc419;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .top-hist{display:flex;gap:8px;padding:8px 10px;flex-shrink:0;}
        .h-box{flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;}
        .month-header{background:#dfe6e9;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;}
        .add-row{background:#e8f5e9;padding:10px 8px;margin:8px 0 0;border-radius:8px;border:1px dashed #2ecc71;}
        .add-row-title{font-size:11px;font-weight:800;color:#27ae60;margin-bottom:6px;}
    </style>
</head>
<body>

<!-- MAIN -->
<div id="mainView">
    <div class="top-hist">
        <div class="h-box" onclick="hType='shopping';openPage('hPage');renderH();">📦 Saman History</div>
        <div class="h-box" onclick="hType='expense';openPage('hPage');renderH();">💰 Kharch History</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:76px;flex-shrink:0;">
                <option value="GROCERY">GROCERY</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')"     id="btn-All"     class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GRO</button>
            <button onclick="setFilter('SABJI')"   id="btn-SABJI"   class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')"    id="btn-BODY"    class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')"   id="btn-OTHER"   class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<!-- DAILY KHARCH -->
<div id="dailyKharchPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">← BACK</span>
        <span>💸 Daily Kharcha</span>
        <span style="font-size:12px;opacity:0.85;" id="dkDateLabel"></span>
    </div>
    <div class="card" style="margin:8px;flex-shrink:0;">
        <div class="in-row">
            <input type="text"   id="kName"  style="flex:1;" placeholder="Item ka naam">
            <input type="number" id="kQty"   class="u-box" placeholder="Qty"  inputmode="decimal">
            <input type="number" id="kPrice" class="p-box" placeholder="Rate" inputmode="decimal">
            <button class="btn" onclick="addK()" style="background:#2ecc71;width:48px;font-size:14px;font-weight:900;">ADD</button>
        </div>
    </div>
    <div class="scroll" id="dkList"></div>
    <div id="dkSum" class="sum-box">TOTAL: ₹0</div>
</div>

<!-- HISTORY -->
<div id="hPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">← BACK</span>
        <span id="hTitle">History</span>
        <span></span>
    </div>
    <div class="scroll" id="hArea"></div>
</div>

<!-- EDIT -->
<div id="editPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">← BACK</span>
        <span>✏️ Edit</span>
        <span></span>
    </div>
    <div class="scroll" id="eList"></div>
    <div id="eSum" class="sum-box"></div>
</div>

<!-- CALC -->
<div id="calcPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">← BACK</span>
        <span>➕➖✖️➗ Bill Calc</span>
        <span></span>
    </div>
    <div class="scroll" id="cList"></div>
    <div id="cSum" class="sum-box"></div>
</div>

<!-- LIST -->
<div id="listPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">← BACK</span>
        <span>🛒 Shopping List</span>
        <span></span>
    </div>
    <div class="scroll" style="background:#fff;">
        <div id="shotArea" style="padding:18px;background:white;">
            <div id="fOut"></div>
        </div>
    </div>
    <div class="b-nav">
        <button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button>
        <button class="btn" style="background:#0984e3;flex:1;height:48px;" onclick="openCalc()">➕➖✖️➗ CALC</button>
    </div>
</div>

<script>
// ============ FIREBASE ============
const firebaseConfig = { databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('grocery/3');

let items = [];
let appHistory = { shopping:[], expense:[] };
let activeF='All', hType='shopping', tCalc=[];
let currentEditDate='', activePage='main';
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Aaj ki date — ek baar set karo
let todayDK = new Date().toLocaleDateString('en-GB');

// Sirf startup par ek baar Firebase se load karo
db.once('value', snap => {
    const d = snap.val();
    if(d){
        items = d.items || [];
        appHistory = d.history || {shopping:[],expense:[]};
        if(!Array.isArray(appHistory.shopping)) appHistory.shopping = Object.values(appHistory.shopping||{});
        if(!Array.isArray(appHistory.expense))  appHistory.expense  = Object.values(appHistory.expense||{});
    }
    renderMaster();
});

function save(){ db.set({items, history:appHistory}); }

// ============ NAVIGATION ============
function openPage(id){
    activePage=id;
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='none';
    let el=document.getElementById(id);
    if(el){ el.style.display='flex'; window.history.pushState({p:id},''); }
}
function closePage(){ activePage='main'; window.history.back(); }
window.onpopstate=()=>{
    activePage='main';
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='flex';
    renderMaster();
};

// ============ MASTER LIST ============
function renderMaster(){
    let cont=document.getElementById('masterList'); if(!cont) return;
    let q=document.getElementById('itemName').value.toLowerCase();
    let filtered=items.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    let n=0;
    cont.innerHTML=filtered.map(it=>{
        let i=items.indexOf(it);
        return `<div class="item-row ${it.sel?'sel-bg':''}">
            <span onclick="toggleI(${i})" style="cursor:pointer;font-size:13px;"><b>${++n}. ${it.name}</b></span>
            <input type="number" value="${it.qty}" onchange="items[${i}].qty=this.value;save();" class="u-box" inputmode="decimal">
            <select onchange="items[${i}].unit=this.value;save();" class="unit-sel">
                <option value="Kg"  ${it.unit=='Kg' ?'selected':''}>Kg</option>
                <option value="Pc"  ${it.unit=='Pc' ?'selected':''}>Pc</option>
                <option value="Ltr" ${it.unit=='Ltr'?'selected':''}>Ltr</option>
                <option value="Rs"  ${it.unit=='Rs' ?'selected':''}>Rs</option>
            </select>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})" style="width:22px;height:22px;">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
}
function toggleI(i){ items[i].sel=!items[i].sel; save(); renderMaster(); }
function addItem(){
    let n=document.getElementById('itemName').value.trim();
    if(n){ items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:true,qty:'',unit:'Kg'}); save(); document.getElementById('itemName').value=''; renderMaster(); }
}
function delItem(i){ if(confirm("Hata dein?")){ items.splice(i,1); save(); renderMaster(); } }
function setFilter(f){
    activeF=f;
    document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active'));
    let b=document.getElementById('btn-'+f); if(b) b.classList.add('active');
    renderMaster();
}
function unselectAll(){ if(confirm("Sab clear?")){ items.forEach(it=>it.sel=false); save(); renderMaster(); } }

// ============ DAILY KHARCH ============
function openDailyKharch(){
    todayDK = new Date().toLocaleDateString('en-GB');
    document.getElementById('dkDateLabel').innerText = todayDK;
    openPage('dailyKharchPage');
    // Thoda wait karo taaki page render ho jaye phir list dikhao
    setTimeout(()=>{ renderDK(todayDK); }, 50);
}

function addK(){
    // Date hamesha fresh lo
    todayDK = new Date().toLocaleDateString('en-GB');

    let n = document.getElementById('kName').value.trim();
    let q = parseFloat(document.getElementById('kQty').value)  || 0;
    let p = parseFloat(document.getElementById('kPrice').value) || 0;

    if(!n){ alert("Item ka naam bharein!"); return; }

    // Us date ka record dhundho ya banao
    let rec = appHistory.expense.find(h=>h.date===todayDK);
    if(!rec){
        rec = {date:todayDK, items:[]};
        appHistory.expense.unshift(rec);
    }

    // Item push karo
    rec.items.push({name:n, qty:q, price:p, done:false});

    // Fields clear karo
    document.getElementById('kName').value  = '';
    document.getElementById('kQty').value   = '';
    document.getElementById('kPrice').value = '';

    // PEHLE render karo — Firebase ka wait nahi
    renderDK(todayDK);

    // Phir save karo background mein
    save();
}

function renderDK(d){
    let area=document.getElementById('dkList');
    if(!area) return;
    let rec=appHistory.expense.find(h=>h.date===d);
    let total=0;
    if(!rec||!rec.items.length){
        area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Aaj koi kharcha nahi hai.</p>";
        document.getElementById('dkSum').innerText="TOTAL: ₹0";
        return;
    }
    area.innerHTML=rec.items.map((it,i)=>{
        total+=parseFloat(it.price)||0;
        return `<div class="dk-grid">
            <span style="color:#636e72;font-size:12px;">${i+1}.</span>
            <b style="font-size:13px;word-break:break-word;">${it.name}</b>
            <input type="number" ${it.done?'disabled':''} value="${it.qty||''}"
                onchange="dkField('${d}',${i},'qty',this.value)" class="u-box" inputmode="decimal">
            <input type="number" ${it.done?'disabled':''} value="${it.price||''}"
                onchange="dkField('${d}',${i},'price',this.value)" class="p-box" inputmode="decimal">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="dkLock('${d}',${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="dkDel('${d}',${i})">✕</button>
        </div>`;
    }).join('');
    document.getElementById('dkSum').innerText=`TOTAL: ₹${total.toFixed(2)}`;
}
function dkField(d,i,f,v){
    let r=appHistory.expense.find(h=>h.date===d);
    if(r){ r.items[i][f]=parseFloat(v)||0; renderDK(d); save(); }
}
function dkLock(d,i){
    let r=appHistory.expense.find(h=>h.date===d);
    if(r){ r.items[i].done=!r.items[i].done; renderDK(d); save(); }
}
function dkDel(d,i){
    if(confirm("Delete?")){
        let r=appHistory.expense.find(h=>h.date===d);
        if(r){ r.items.splice(i,1); renderDK(d); save(); }
    }
}

// ============ HISTORY ============
function renderH(){
    let tm={shopping:'📦 Saman History',expense:'💰 Kharch History'};
    document.getElementById('hTitle').innerText=tm[hType];
    let area=document.getElementById('hArea'); area.innerHTML='';
    let sorted=[...(appHistory[hType]||[])].sort((a,b)=>{
        let da=a.date.split('/'),db=b.date.split('/');
        return new Date(db[2],db[1]-1,db[0])-new Date(da[2],da[1]-1,da[0]);
    });
    let curM='',html='',mTot=0;
    sorted.forEach(h=>{
        let p=h.date.split('/'), m=months[parseInt(p[1])-1]+' '+p[2];
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        if(curM!==m&&curM!==''){
            area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html;
            html=''; mTot=0;
        }
        curM=m; mTot+=dTot;
        html+=`<div class="hist-row">
            <span style="font-size:13px;">${h.date}</span>
            <b style="color:#0984e3;">₹${dTot.toFixed(2)}</b>
            <button class="btn ok-btn" style="font-size:10px;" onclick="editH('${h.date}')">EDIT</button>
            <button class="btn del-btn" onclick="delH('${h.date}')">✕</button>
        </div>`;
    });
    if(curM) area.innerHTML+=`<div class="month-header">${curM} — Total: ₹${mTot.toFixed(2)}</div>`+html;
    if(!sorted.length) area.innerHTML="<p style='text-align:center;padding:28px;color:#b2bec3;'>Koi history nahi hai.</p>";
}

// ============ EDIT PAGE ============
function editH(date){
    currentEditDate=date;
    let rec=appHistory[hType].find(h=>h.date===date); if(!rec) return;
    let area=document.getElementById('eList');

    // Items list
    let itemsHTML=rec.items.map((it,i)=>
        `<div class="edit-grid">
            <span style="color:#636e72;">${i+1}.</span>
            <input type="text" ${it.done?'disabled':''} value="${it.name}"
                onchange="eField('${hType}','${date}',${i},'name',this.value)"
                style="font-size:13px;min-width:0;">
            <input type="number" ${it.done?'disabled':''} value="${it.qty||''}"
                onchange="eField('${hType}','${date}',${i},'qty',this.value)"
                class="u-box" inputmode="decimal">
            <input type="number" ${it.done?'disabled':''} value="${it.price||''}"
                onchange="eField('${hType}','${date}',${i},'price',this.value)"
                class="p-box" inputmode="decimal">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}"
                onclick="eLock('${hType}','${date}',${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="eDel('${hType}','${date}',${i})">✕</button>
        </div>`
    ).join('');

    // ADD ROW — same naam ho to qty+price JODEGA
    let addRowHTML=`<div class="add-row">
        <div class="add-row-title">➕ ITEM JODO — same naam ho to qty+price jud jayega</div>
        <div class="in-row">
            <input type="text"   id="eAddName"  style="flex:1;" placeholder="Naam">
            <input type="number" id="eAddQty"   class="u-box" placeholder="Qty"  inputmode="decimal">
            <input type="number" id="eAddPrice" class="p-box" placeholder="₹"    inputmode="decimal">
            <button class="btn" style="background:#0984e3;width:48px;"
                onclick="eAddItem('${hType}','${date}')">ADD</button>
        </div>
    </div>`;

    area.innerHTML = itemsHTML + addRowHTML;
    updateESum(date);
    openPage('editPage');
}

// Edit ADD — same item ho to qty+price JODO, naya na bana
function eAddItem(type, date){
    let n = document.getElementById('eAddName').value.trim();
    let q = parseFloat(document.getElementById('eAddQty').value)  || 0;
    let p = parseFloat(document.getElementById('eAddPrice').value) || 0;

    if(!n){ alert("Naam zaroor bharein!"); return; }

    let rec=appHistory[type].find(h=>h.date===date); if(!rec) return;

    // Same naam dhundho
    let ex=rec.items.find(e=>e.name.toLowerCase()===n.toLowerCase());
    if(ex){
        // Pehle se hai — JODO
        ex.qty   = (parseFloat(ex.qty)||0)   + q;
        ex.price = (parseFloat(ex.price)||0) + p;
    } else {
        // Naya item
        rec.items.push({name:n, qty:q, price:p, done:false});
    }

    document.getElementById('eAddName').value  = '';
    document.getElementById('eAddQty').value   = '';
    document.getElementById('eAddPrice').value = '';

    editH(date); // re-render
    save();
}

function eField(type,d,i,f,v){
    let rec=appHistory[type].find(h=>h.date===d); if(!rec) return;
    rec.items[i][f]=(f==='name')?v:(parseFloat(v)||0);
    updateESum(d); save();
}
function eLock(type,d,i){
    let rec=appHistory[type].find(h=>h.date===d); if(!rec) return;
    rec.items[i].done=!rec.items[i].done;
    editH(d); save();
}
function eDel(type,d,i){
    if(confirm("Delete?")){
        let rec=appHistory[type].find(h=>h.date===d);
        if(rec){ rec.items.splice(i,1); editH(d); save(); }
    }
}
function updateESum(d){
    let rec=appHistory[hType].find(h=>h.date===d); if(!rec) return;
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('eSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
}
function delH(d){
    if(confirm("Poora din hataein?")){
        appHistory[hType]=appHistory[hType].filter(h=>h.date!==d);
        save(); renderH();
    }
}

// ============ FINAL LIST ============
function showFinalList(){
    let sel=items.filter(it=>it.sel);
    if(!sel.length){ alert("Pehle item choose karo!"); return; }
    let out=document.getElementById('fOut');
    out.innerHTML=`<h2 style="text-align:center;color:#0984e3;border-bottom:3px solid #0984e3;padding-bottom:10px;margin-bottom:15px;">🛒 SAMAN LIST</h2>`;
    ['GROCERY','SABJI','BODY','OTHER'].forEach(c=>{
        let f=sel.filter(it=>it.cat===c);
        if(f.length){
            out.innerHTML+=`<div style="background:#2d3436;color:#fff;padding:5px 12px;border-radius:4px;font-size:12px;margin:14px 0 7px;display:inline-block;">${c}</div>`+
            f.map((it,j)=>`<div style="display:flex;justify-content:space-between;padding:11px 5px;border-bottom:1px dashed #ccc;font-weight:bold;">
                <span>${j+1}. ${it.name}</span><span style="color:#0984e3;">${it.qty} ${it.unit}</span></div>`).join('');
        }
    });
    openPage('listPage');
}

// ============ CALC ============
function openCalc(){
    tCalc=items.filter(it=>it.sel).map(it=>({
        name:it.name, qty:parseFloat(it.qty)||0, unit:it.unit, price:0, done:false
    }));
    renderC();
    openPage('calcPage');
}
function renderC(){
    let area=document.getElementById('cList');
    area.innerHTML=tCalc.map((it,i)=>
        `<div class="calc-row">
            <b style="font-size:13px;">${it.name}</b>
            <span style="color:#636e72;font-size:12px;">${it.qty} ${it.unit}</span>
            <input type="number" ${it.done?'disabled':''} placeholder="₹ Rate"
                value="${it.price>0?it.price:''}"
                onchange="calcPrice(${i},this.value)"
                class="p-box" inputmode="decimal">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}"
                onclick="calcLock(${i})">${it.done?'✓':'🔒'}</button>
        </div>`
    ).join('');
    renderCSum();
}

// Price dale to auto save shopping history
function calcPrice(i,v){
    tCalc[i].price=parseFloat(v)||0;
    renderCSum();
    autoSaveCalc();
}
// Lock kare to bhi auto save
function calcLock(i){
    tCalc[i].done=!tCalc[i].done;
    renderC();
    autoSaveCalc();
}

// Auto save — price > 0 wale items shopping history mein
// Same naam aaye to qty+price JODO (chips example)
function autoSaveCalc(){
    let filled=tCalc.filter(it=>it.price>0);
    if(!filled.length) return;

    let d=new Date().toLocaleDateString('en-GB');
    let rec=appHistory.shopping.find(h=>h.date===d);
    if(!rec){ rec={date:d,items:[]}; appHistory.shopping.unshift(rec); }

    filled.forEach(newIt=>{
        let ex=rec.items.find(e=>e.name.toLowerCase()===newIt.name.toLowerCase());
        if(ex){
            // Same item — qty aur price JODO
            ex.qty   = (parseFloat(ex.qty)||0)   + (parseFloat(newIt.qty)||0);
            ex.price = (parseFloat(ex.price)||0) + (parseFloat(newIt.price)||0);
        } else {
            rec.items.push({name:newIt.name,qty:newIt.qty,unit:newIt.unit,price:newIt.price,done:newIt.done});
        }
    });
    save();
}

function renderCSum(){
    let t=tCalc.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('cSum').innerText=`BILL TOTAL: ₹${t.toFixed(2)}`;
}

function takeShot(){
    html2canvas(document.getElementById('shotArea')).then(c=>{
        let a=document.createElement('a'); a.download='SamanList.png'; a.href=c.toDataURL(); a.click();
    });
}
</script>
