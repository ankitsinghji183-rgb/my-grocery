<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery & Kharch v29</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --orange: #ff9800; --bg: #f1f3f4; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 0; font-size: 13px; -webkit-tap-highlight-color: transparent; }
        
        /* Top Navigation */
        .top-nav { display: flex; gap: 4px; padding: 5px; background: #fff; border-bottom: 1px solid #ddd; }
        .btn-hist { flex: 1; padding: 7px; border: none; border-radius: 4px; color: white; font-size: 11px; font-weight: bold; }
        .i-hist { background: #5c6bc0; } .k-hist { background: #00897b; }

        .input-card { background: white; padding: 6px; display: flex; gap: 3px; align-items: center; border-bottom: 1px solid #ddd; }
        input, select { padding: 5px; border: 1px solid #ccc; border-radius: 3px; font-size: 12px; outline: none; }
        .btn-add { background: var(--success); color: white; border: none; padding: 0 12px; height: 30px; border-radius: 3px; font-weight: bold; }

        .filter-bar { display: flex; gap: 3px; padding: 5px; overflow-x: auto; background: #fff; }
        .f-btn { padding: 4px 10px; border-radius: 12px; font-size: 10px; border: 1px solid #ccc; background: #fff; white-space: nowrap; font-weight: bold; }
        .f-active { background: var(--primary); color: white; border: none; }

        .list-area { margin-bottom: 75px; }
        .item-row { display: flex; align-items: center; padding: 7px 10px; background: white; border-bottom: 1px solid #eee; }
        .item-row.sel { background: #e8f0fe; }
        .item-name { flex: 1; font-weight: bold; color: #000; }
        
        /* Pages */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; flex-direction: column; }
        .page-head { background: var(--primary); color: white; display: flex; align-items: center; padding: 10px; font-weight: bold; }
        .scroll { flex: 1; overflow-y: auto; padding: 8px; background: #f9f9f9; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; display: flex; gap: 4px; padding: 6px; background: white; box-shadow: 0 -1px 5px rgba(0,0,0,0.1); box-sizing: border-box; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 5px; border: none; color: white; font-weight: bold; font-size: 13px; }

        /* Calculation & Rows */
        .calc-item { background: white; padding: 8px; margin-bottom: 4px; border-radius: 4px; display: flex; align-items: center; gap: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .price-in { width: 65px; text-align: right; font-weight: 900; border: 1px solid #999; padding: 4px; color: blue; }
        .conf-btn { font-size: 9px; padding: 4px 6px; border-radius: 3px; background: #eee; font-weight: bold; }
        .done { background: var(--success); color: white; }
        .total-box { text-align: right; padding: 12px; font-weight: 900; font-size: 16px; border-top: 2px solid #000; background: #fff; }

        .hist-card { background: white; padding: 10px; margin-bottom: 6px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .btn-edit { background: var(--orange); color: white; padding: 4px 10px; border-radius: 3px; font-size: 10px; border: none; }
    </style>
</head>
<body>

<div class="main-app">
    <div class="top-nav">
        <button class="btn-hist i-hist" onclick="openHistory('shopping')">ITEM HIST</button>
        <button class="btn-hist k-hist" onclick="openHistory('expense')">KHARCH HIST</button>
    </div>

    <div class="input-card">
        <input type="text" id="itemName" placeholder="Item Name..." style="flex:1;" oninput="renderItems()">
        <select id="catSelect" style="width:70px;"><option value="GROCERY">GROC</option><option value="SABJI">SABJI</option><option value="OTHER">MISC</option></select>
        <button class="btn-add" onclick="addItem()">ADD</button>
    </div>

    <div class="filter-bar">
        <button class="f-btn f-active" onclick="setFilter('All', this)">ALL</button>
        <button class="f-btn" onclick="setFilter('GROCERY', this)">GROC</button>
        <button class="f-btn" onclick="setFilter('SABJI', this)">SABJI</button>
        <button class="f-btn" onclick="setFilter('OTHER', this)">OTHER</button>
    </div>

    <div id="masterList" class="list-area"></div>

    <div class="bottom-nav">
        <button class="nav-btn" style="background:var(--primary);" onclick="showFinalPage()">SHOPPING LIST</button>
        <button class="nav-btn" style="background:var(--orange);" onclick="openPage('kharchPage')">DAILY KHARCH</button>
    </div>
</div>

<div id="listPage" class="full-page">
    <div class="page-head">
        <span onclick="closePage('listPage')">← Back</span>
        <div style="flex:1;text-align:center;">List / सूची</div>
        <button onclick="toggleLang()" id="langBtn" style="background:white; color:black; border:none; padding:2px 8px; border-radius:3px; font-size:10px;">HI</button>
    </div>
    <div class="scroll">
        <div id="captureArea" style="background:white; padding:15px;">
            <div id="finalDisplay"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <button class="nav-btn" style="background:var(--orange); padding:10px;" onclick="downloadList()">PHOTO</button>
        <button class="nav-btn" style="background:var(--success);" onclick="openCalculation()">CALCULATION</button>
    </div>
</div>

<div id="calcPage" class="full-page">
    <div class="page-head"><span onclick="closePage('calcPage')">← Back</span><div style="flex:1;text-align:center;">Calculation</div></div>
    <div class="scroll" id="calcArea"></div>
    <div class="bottom-nav"><button class="nav-btn" style="background:var(--success); width:100%;" onclick="saveToHistory('shopping')">SAVE ITEM HISTORY</button></div>
</div>

<div id="kharchPage" class="full-page">
    <div class="page-head"><span onclick="closePage('kharchPage')">← Back</span><div style="flex:1;text-align:center;">Daily Kharch</div></div>
    <div class="input-card">
        <input type="text" id="kName" placeholder="Item Name & Qty..." style="flex:1;">
        <input type="number" id="kPrice" placeholder="Rs" style="width:70px;">
        <button class="btn-add" onclick="addKharch()">ADD</button>
    </div>
    <div class="scroll" id="kharchArea"></div>
    <div class="bottom-nav"><button class="nav-btn" style="background:var(--orange); width:100%;" onclick="saveToHistory('expense')">SAVE KHARCH HISTORY</button></div>
</div>

<div id="histPage" class="full-page">
    <div class="page-head"><span onclick="closePage('histPage')">← Back</span><div id="histTitle" style="flex:1;text-align:center;">History</div></div>
    <div class="filter-bar">
        <input type="text" id="hSearch" placeholder="Search Date..." style="flex:1;" oninput="renderHistory()">
        <select id="mFilter" onchange="renderHistory()"><option value="All">Month</option></select>
    </div>
    <div id="mTotal" class="total-box" style="border:none; padding:10px; font-size:14px;">Month Total: ₹0</div>
    <div class="scroll" id="histList"></div>
</div>

<script>
    let items = JSON.parse(localStorage.getItem('gItems')) || [];
    let kharchList = [];
    let history = JSON.parse(localStorage.getItem('gHistory')) || { shopping: [], expense: [] };
    let curFilter = 'All', curLang = 'EN', editIdx = -1;

    // Navigation
    function openPage(id) { document.getElementById(id).style.display='flex'; }
    function closePage(id) { document.getElementById(id).style.display='none'; editIdx = -1; }

    // Logic for v24 formatting (0.500 = 500gm)
    function fmtQty(q, u) {
        let v = parseFloat(q);
        if(!v) return '';
        if(v < 1) {
            return (v * 1000) + (u === 'Kg' ? ' gm' : ' ml');
        }
        return v + ' ' + u;
    }

    function addItem() {
        let n = document.getElementById('itemName').value;
        if(!n) return;
        items.unshift({name: n, cat: document.getElementById('catSelect').value, sel: false, qty: '', unit: 'Kg'});
        save(); renderItems(); document.getElementById('itemName').value='';
    }

    function renderItems() {
        let cont = document.getElementById('masterList'), search = document.getElementById('itemName').value.toLowerCase();
        cont.innerHTML = items.map((it, i) => {
            if(curFilter !== 'All' && it.cat !== curFilter) return '';
            if(search && !it.name.toLowerCase().includes(search)) return '';
            return `<div class="item-row ${it.sel?'sel':''}">
                <span class="item-name" onclick="toggleI(${i})">${it.name}</span>
                <input type="number" value="${it.qty}" placeholder="Qty" oninput="items[${i}].qty=this.value;save()" style="width:40px; height:24px; margin-right:3px;">
                <select onchange="items[${i}].unit=this.value;save()" style="height:24px; font-size:10px;">
                    <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option><option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option><option value="Rs" ${it.unit=='Rs'?'selected':''}>Rs</option>
                </select>
                <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})" style="margin-left:8px; width:18px; height:18px;">
            </div>`;
        }).join('');
    }

    function toggleI(i) { items[i].sel = !items[i].sel; save(); renderItems(); }
    function save() { localStorage.setItem('gItems', JSON.stringify(items)); localStorage.setItem('gHistory', JSON.stringify(history)); }
    function setFilter(f, b) { 
        curFilter = f; document.querySelectorAll('.f-btn').forEach(btn=>btn.classList.remove('f-active'));
        b.classList.add('f-active'); renderItems(); 
    }

    function toggleLang() {
        curLang = curLang === 'EN' ? 'HI' : 'EN';
        document.getElementById('langBtn').innerText = curLang === 'EN' ? 'HI' : 'EN';
        showFinalPage();
    }

    function showFinalPage() {
        let disp = document.getElementById('finalDisplay'), sel = items.filter(it => it.sel);
        if(!sel.length) return alert("Items select karein!");
        let h = curLang === 'EN' ? "SHOPPING LIST" : "खरीदारी की सूची";
        disp.innerHTML = `<h3 style="text-align:center; border-bottom:2px solid #000; padding-bottom:5px;">${h}</h3>`;
        
        let cats = { 'GROCERY': curLang==='EN'?'GROCERY':'किराना', 'SABJI': curLang==='EN'?'SABJI':'सब्जी', 'OTHER': curLang==='EN'?'OTHER':'अन्य' };
        
        Object.keys(cats).forEach(c => {
            let filtered = sel.filter(it => it.cat === c);
            if(filtered.length) {
                disp.innerHTML += `<div style="background:#eee; padding:4px; font-weight:bold; margin-top:10px;">${cats[c]}</div>` + 
                filtered.map((it, i) => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #ccc;">
                    <span>${i+1}. ${it.name}</span><span style="font-weight:900;">${fmtQty(it.qty, it.unit)}</span><span style="border-bottom:2px solid #000; width:45px;"></span>
                </div>`).join('');
            }
        });
        openPage('listPage');
    }

    let cList = [];
    function openCalculation() {
        cList = JSON.parse(JSON.stringify(items.filter(it => it.sel)));
        renderCalc(); openPage('calcPage');
    }
    function renderCalc() {
        let area = document.getElementById('calcArea'); area.innerHTML = ''; let total = 0;
        ['GROCERY','SABJI','OTHER'].forEach(c => {
            let f = cList.filter(it => it.cat === c);
            if(f.length) {
                let sub = 0; area.innerHTML += `<div style="color:var(--primary); font-weight:bold; margin:8px 0 4px;">${c}</div>`;
                f.forEach((it, i) => {
                    let p = parseFloat(it.price) || 0; sub += p; total += p;
                    area.innerHTML += `<div class="calc-item">
                        <span style="width:20px; font-size:10px;">${i+1}</span><span style="flex:1; font-weight:bold;">${it.name}</span>
                        <input type="number" class="price-in" value="${it.price||''}" placeholder="Rs" oninput="updatePrice('${it.name}',this.value)">
                        <div class="conf-btn ${it.done?'done':''}" onclick="confItem('${it.name}')">${it.done?'DONE':'CONFIRM'}</div>
                    </div>`;
                });
                area.innerHTML += `<div style="text-align:right; font-size:11px; margin-bottom:8px;">Sub: ₹${sub}</div>`;
            }
        });
        area.innerHTML += `<div class="total-box">GRAND TOTAL: ₹${total}</div>`;
    }
    function updatePrice(n, p) { cList.find(x=>x.name===n).price = p; renderCalc(); }
    function confItem(n) { let it = cList.find(x=>x.name===n); it.done = !it.done; renderCalc(); }

    function addKharch() {
        let n = document.getElementById('kName').value, p = document.getElementById('kPrice').value;
        if(n && p) { kharchList.push({name: n, price: p}); renderKharch(); document.getElementById('kName').value=''; document.getElementById('kPrice').value=''; }
    }
    function renderKharch() {
        let area = document.getElementById('kharchArea'); let total = 0;
        area.innerHTML = kharchList.map((it, i) => {
            total += parseFloat(it.price);
            return `<div class="calc-item"><span>${i+1}. ${it.name}</span><span style="flex:1; text-align:right; font-weight:bold; margin-right:10px;">${it.price}Rs</span><span style="color:red; font-weight:bold;" onclick="kharchList.splice(${i},1);renderKharch()">Del</span></div>`;
        }).join('');
        area.innerHTML += `<div class="total-box">Total Kharch: ₹${total}</div>`;
    }

    function saveToHistory(type) {
        let date = new Date().toLocaleDateString('en-GB');
        let data = (type === 'shopping') ? cList : kharchList;
        if(!data.length) return alert("Khali hai!");
        if(editIdx > -1) { history[type][editIdx] = {date, items: data}; editIdx = -1; }
        else { history[type].unshift({date, items: data}); }
        save(); alert("History mein save ho gaya!");
        closePage(type === 'shopping' ? 'calcPage' : 'kharchPage');
    }

    function openHistory(type) {
        hType = type; document.getElementById('histTitle').innerText = (type==='shopping'?'Item History':'Kharch History');
        let mSel = document.getElementById('mFilter'); mSel.innerHTML = '<option value="All">All Months</option>';
        ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"].forEach((m, i) => mSel.innerHTML += `<option value="${i+1}">${m}</option>`);
        renderHistory(); openPage('histPage');
    }
    function renderHistory() {
        let cont = document.getElementById('histList'), search = document.getElementById('hSearch').value, month = document.getElementById('mFilter').value;
        let totalVal = 0; cont.innerHTML = '';
        history[hType].forEach((h, i) => {
            if(search && !h.date.includes(search)) return;
            if(month !== 'All' && parseInt(h.date.split('/')[1]) != month) return;
            let total = h.items.reduce((a, it) => a + (parseFloat(it.price)||0), 0); totalVal += total;
            cont.innerHTML += `<div class="hist-card">
                <div><b>${h.date}</b><br><small>${h.items.length} items</small></div>
                <div style="text-align:right;"><b>₹${total}</b><br>
                    <button class="btn-edit" onclick="editHistory(${i})">Edit</button>
                    <span style="color:red; font-size:11px; margin-left:8px;" onclick="delHist(${i})">Del</span>
                </div>
            </div>`;
        });
        document.getElementById('mTotal').innerText = `Month Total: ₹${totalVal}`;
    }
    function editHistory(i) {
        editIdx = i;
        if(hType === 'shopping') { cList = JSON.parse(JSON.stringify(history.shopping[i].items)); renderCalc(); openPage('calcPage'); }
        else { kharchList = JSON.parse(JSON.stringify(history.expense[i].items)); renderKharch(); openPage('kharchPage'); }
    }
    function delHist(i) { if(confirm("Hamesha ke liye delete?")) { history[hType].splice(i, 1); save(); renderHistory(); } }

    function downloadList() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            let l = document.createElement('a'); l.download = `Shopping_List.png`; l.href = canvas.toDataURL(); l.click();
        });
    }
    window.onload = renderItems;
</script>
</body>
</html>
