<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master v78 Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3436; }
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f4f8; display: none; flex-direction: column; z-index: 100; overflow: hidden; }
        #mainView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; overflow: hidden; z-index: 1; }
        .p-head { background: #0984e3; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 18px; box-shadow: 0 3px 10px rgba(0,0,0,0.15); flex-shrink: 0; }
        .p-head span:first-child { cursor: pointer; padding: 4px 8px; background: rgba(255,255,255,0.2); border-radius: 6px; font-size: 14px; }
        .scroll { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #e1e8ed; flex-shrink: 0; }
        .in-row { display: flex; gap: 6px; width: 100%; align-items: center; }
        input, select { padding: 8px 6px; border: 1px solid #dfe6e9; border-radius: 8px; font-size: 13px; height: 42px; background: #fff; min-width: 0; }
        input:disabled { background: #f1f2f6; color: #7f8c8d; border: 1px dashed #bdc3c7; font-weight: bold; }
        .u-box { width: 55px !important; text-align: center; flex-shrink: 0; }
        .p-box { width: 80px !important; font-weight: 800; color: #27ae60; flex-shrink: 0; }
        .btn { border: none; border-radius: 8px; color: white; font-weight: 700; cursor: pointer; font-size: 12px; height: 42px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .f-btn { flex: 1; background: #636e72; font-size: 9px; height: 36px; }
        .f-btn.active { background: #0984e3 !important; }
        .del-btn { background: #ff7675 !important; width: 38px; }
        .ok-btn { background: #2ecc71 !important; width: 38px; }
        .lock-btn { background: #fdcb6e !important; color: #2d3436; width: 38px; }
        .item-row { display: grid; grid-template-columns: 1fr 55px 65px 30px 38px; gap: 6px; align-items: center; padding: 10px; border-bottom: 1px solid #f1f2f6; background: white; border-radius: 8px; margin-bottom: 4px; }
        .dk-grid, .edit-grid { display: grid; grid-template-columns: 24px 1fr 55px 80px 38px 38px; gap: 5px; align-items: center; padding: 10px 8px; border-bottom: 1px solid #eee; background: white; border-radius: 6px; margin-bottom: 3px; font-size: 13px; }
        .sum-box { padding: 14px 18px; background: #e3f2fd; font-weight: 900; text-align: right; border-top: 4px solid #0984e3; font-size: 18px; color: #0984e3; flex-shrink: 0; }
        .b-nav { width: 100%; background: white; padding: 10px; border-top: 1px solid #dfe6e9; display: flex; gap: 10px; flex-shrink: 0; }
        .top-hist { display: flex; gap: 8px; padding: 10px; flex-shrink: 0; }
        .h-box { flex: 1; background: #f8f9fa; border: 1px solid #dfe6e9; padding: 14px 0; text-align: center; border-radius: 12px; font-weight: 800; font-size: 11px; color: #0984e3; }
        .hist-row { display: grid; grid-template-columns: 1fr 90px 50px 40px; gap: 6px; align-items: center; padding: 12px 10px; border-bottom: 1px solid #f1f2f6; background: white; border-radius: 8px; margin-bottom: 4px; }
        .month-header { background: #dfe6e9; padding: 10px; font-weight: 800; font-size: 13px; border-radius: 6px; margin: 10px 0 5px 0; }
        .sel-bg { background: #fff9db !important; border-left: 5px solid #fcc419; }
    </style>
</head>
<body>

    <div id="mainView">
        <div class="p-head">
            <span onclick="hType='shopping'; renderH(); openPage('histPage')">📦 History</span>
            <span>Grocery Master</span>
            <span onclick="hType='expense'; renderH(); openPage('histPage')">💰 Kharch</span>
        </div>

        <div class="top-hist">
            <div class="h-box" onclick="showFinalList()">🛒 Saman List</div>
            <div class="h-box" onclick="openDailyKharch()">💸 Daily Kharch</div>
        </div>

        <div class="card" style="margin: 0 10px 10px 10px;">
            <div class="in-row">
                <input type="text" id="itemName" placeholder="Item ka naam..." style="flex:1;" oninput="renderMaster()">
                <select id="catSelect" style="width:80px;">
                    <option>GROCERY</option><option>SABJI</option><option>BODY</option><option>ANYA</option>
                </select>
                <button class="btn ok-btn" onclick="addItem()" style="width:50px;">ADD</button>
            </div>
        </div>

        <div class="b-nav" style="padding-top:0; border:none;">
            <button onclick="setFilter('All')" id="btn-All" class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GROCERY</button>
            <button onclick="setFilter('SABJI')" id="btn-SABJI" class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')" id="btn-BODY" class="btn f-btn">BODY</button>
            <button onclick="setFilter('ANYA')" id="btn-ANYA" class="btn f-btn">ANYA</button>
            <button class="btn del-btn" style="font-size:9px; height:36px;" onclick="unselectAll()">CLR</button>
        </div>

        <div id="masterList" class="scroll"></div>
    </div>

    <div id="dailyKharchPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span> <span id="dkDateLabel"></span> <span>💸 Daily</span></div>
        <div class="card" style="margin:10px;">
            <div class="in-row">
                <input type="text" id="kName" placeholder="Item..." style="flex:1.5;">
                <input type="number" id="kQty" placeholder="Qty" class="u-box" inputmode="decimal">
                <input type="number" id="kPrice" placeholder="₹" class="p-box" inputmode="decimal">
                <button class="btn ok-btn" onclick="addK()">ADD</button>
            </div>
        </div>
        <div id="dkList" class="scroll"></div>
        <div id="dkSum" class="sum-box">TOTAL: ₹0</div>
    </div>

    <div id="histPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span> <span id="hTitle">History</span> <span></span></div>
        <div id="hArea" class="scroll"></div>
    </div>

    <div id="editPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span> <span>✏️ Edit & Add</span> <span></span></div>
        <div id="eList" class="scroll"></div>
        <div id="eSum" class="sum-box">TOTAL: ₹0</div>
    </div>

    <div id="listPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span> <span>🛒 Shopping List</span> <span></span></div>
        <div id="shotArea" class="scroll" style="background:white;">
            <div id="fOut"></div>
        </div>
        <div class="b-nav">
            <button class="btn ok-btn" style="flex:1;" onclick="takeShot()">📷 SAVE IMAGE</button>
            <button class="btn lock-btn" style="flex:1;" onclick="openCalc()">🧮 OPEN CALC</button>
        </div>
    </div>

    <div id="calcPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span> <span>🧮 Bill Calculator</span> <span></span></div>
        <div id="cList" class="scroll"></div>
        <div id="cSum" class="sum-box">BILL TOTAL: ₹0</div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref('grocery/3');

        let items = [];
        let history = { shopping: [], expense: [] };
        let activeF = 'All', hType = 'shopping', tCalc = [];
        const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        // FIREBASE SYNC
        db.on('value', (snap) => {
            const d = snap.val();
            if (d) {
                items = d.items || [];
                history = d.history || { shopping: [], expense: [] };
                // Fix for list not showing: Ensure arrays
                if (!Array.isArray(history.shopping)) history.shopping = Object.values(history.shopping || {});
                if (!Array.isArray(history.expense))  history.expense  = Object.values(history.expense  || {});
                renderMaster();
            }
        });

        const save = (cb) => db.set({ items, history }).then(() => { if (cb) cb(); });

        // NAVIGATION
        function openPage(id) {
            document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            window.history.pushState({ p: id }, '');
        }
        function closePage() { window.history.back(); }
        window.onpopstate = () => document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');

        // MASTER LIST
        function renderMaster() {
            let cont = document.getElementById('masterList');
            let q = document.getElementById('itemName').value.toLowerCase();
            let filtered = items.filter(it => (activeF === 'All' || it.cat === activeF) && it.name.toLowerCase().includes(q));
            cont.innerHTML = filtered.map((it) => {
                let rIdx = items.indexOf(it);
                return `<div class="item-row ${it.sel ? 'sel-bg' : ''}">
                    <span onclick="toggleI(${rIdx})" style="font-size:13px;"><b>${it.name}</b></span>
                    <input type="number" step="0.001" value="${it.qty}" oninput="items[${rIdx}].qty=this.value; save()" class="u-box" inputmode="decimal">
                    <select onchange="items[${rIdx}].unit=this.value; save()" style="width:65px; font-size:11px; background:#f1f2f6; border:none;">
                        <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option>
                        <option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option>
                        <option value="Ltr" ${it.unit=='Ltr'?'selected':''}>Ltr</option>
                        <option value="Rs" ${it.unit=='Rs'?'selected':''}>Rs</option>
                    </select>
                    <input type="checkbox" ${it.sel ? 'checked' : ''} onclick="toggleI(${rIdx})" style="width:20px; height:20px;">
                    <button class="btn del-btn" onclick="delMasterItem(${rIdx})">✕</button>
                </div>`;
            }).join('');
        }
        function toggleI(i) { items[i].sel = !items[i].sel; save(); }
        function addItem() {
            let n = document.getElementById('itemName').value.trim();
            if (n) {
                items.unshift({ name: n, cat: document.getElementById('catSelect').value, sel: true, qty: '', unit: 'Kg' });
                save(); document.getElementById('itemName').value = '';
            }
        }
        function delMasterItem(i) { if (confirm("Hata dein?")) { items.splice(i, 1); save(); } }
        function setFilter(f) {
            activeF = f;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + f).classList.add('active');
            renderMaster();
        }
        function unselectAll() { if (confirm("Clear all?")) { items.forEach(it => it.sel = false); save(); } }

        // DAILY KHARCH
        function openDailyKharch() {
            let d = new Date().toLocaleDateString('en-GB');
            document.getElementById('dkDateLabel').innerText = d;
            renderDK(d); openPage('dailyKharchPage');
        }
        function addK() {
            let n = document.getElementById('kName').value.trim();
            let q = parseFloat(document.getElementById('kQty').value) || 0;
            let p = parseFloat(document.getElementById('kPrice').value) || 0;
            if (!n) return;
            let d = new Date().toLocaleDateString('en-GB');
            let rec = history.expense.find(h => h.date === d);
            if (!rec) { rec = { date: d, items: [] }; history.expense.unshift(rec); }
            rec.items.push({ name: n, qty: q, price: p, done: false });
            save(() => {
                renderDK(d);
                document.getElementById('kName').value = ''; document.getElementById('kQty').value = ''; document.getElementById('kPrice').value = '';
            });
        }
        function renderDK(d) {
            let rec = history.expense.find(h => h.date === d);
            let area = document.getElementById('dkList'), total = 0;
            if (!rec || !rec.items.length) {
                area.innerHTML = "<p style='text-align:center; padding:30px;'>No record.</p>";
                document.getElementById('dkSum').innerText = "TOTAL: ₹0"; return;
            }
            area.innerHTML = rec.items.map((it, i) => {
                total += parseFloat(it.price) || 0;
                return `<div class="dk-grid">
                    <span>${i+1}</span> <b>${it.name}</b>
                    <input type="number" ${it.done?'disabled':''} value="${it.qty}" oninput="updHF('expense','${d}',${i},'qty',this.value)" class="u-box" inputmode="decimal">
                    <input type="number" ${it.done?'disabled':''} value="${it.price}" oninput="updHF('expense','${d}',${i},'price',this.value)" class="p-box" inputmode="decimal">
                    <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="lockH('expense','${d}',${i})">${it.done?'✓':'🔒'}</button>
                    <button class="btn del-btn" onclick="delHI('expense','${d}',${i})">✕</button>
                </div>`;
            }).join('');
            document.getElementById('dkSum').innerText = `TOTAL: ₹${total.toFixed(2)}`;
        }

        // HISTORY & EDIT (ADD LOGIC INCLUDED)
        function renderH() {
            document.getElementById('hTitle').innerText = hType==='shopping'?'📦 Saman History':'💰 Kharch History';
            let area = document.getElementById('hArea'); area.innerHTML = '';
            let sorted = [...(history[hType] || [])].sort((a,b) => {
                let da=a.date.split('/'), db=b.date.split('/');
                return new Date(db[2],db[1]-1,db[0]) - new Date(da[2],da[1]-1,da[0]);
            });
            let curM = '', html = '', mTot = 0;
            sorted.forEach(h => {
                let p=h.date.split('/'), m=months[p[1]-1]+' '+p[2], dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
                if (curM !== m && curM !== '') { area.innerHTML += `<div class="month-header">${curM} — ₹${mTot.toFixed(2)}</div>` + html; html=''; mTot=0; }
                curM = m; mTot += dTot;
                html += `<div class="hist-row"><span>${h.date}</span><b>₹${dTot.toFixed(2)}</b>
                    <button class="btn ok-btn" onclick="editH('${h.date}')">EDIT</button>
                    <button class="btn del-btn" onclick="delH('${h.date}')">✕</button></div>`;
            });
            if(curM) area.innerHTML += `<div class="month-header">${curM} — ₹${mTot.toFixed(2)}</div>` + html;
        }

        function editH(date) {
            let rec = history[hType].find(h => h.date === date);
            if (!rec) return;
            let area = document.getElementById('eList');
            area.innerHTML = rec.items.map((it, i) => {
                return `<div class="edit-grid">
                    <span>${i+1}</span>
                    <input type="text" value="${it.name}" readonly style="font-size:12px; border:none;">
                    <input type="number" placeholder="+Qty" onchange="addMore('${date}',${i},'qty',this.value)" class="u-box" style="background:#e3f2fd; border:1px solid #0984e3;" inputmode="decimal">
                    <input type="number" placeholder="+Rs" onchange="addMore('${date}',${i},'price',this.value)" class="p-box" style="background:#e8f5e9; border:1px solid #27ae60;" inputmode="decimal">
                    <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="lockH('${hType}','${date}',${i})">${it.done?'✓':'🔒'}</button>
                    <button class="btn del-btn" onclick="delHI('${hType}','${date}',${i})">✕</button>
                    <div style="grid-column: span 6; font-size:10px; color:#636e72; padding-left:30px;">Current: ${it.qty} | ₹${it.price}</div>
                </div>`;
            }).join('');
            updateEditSum(date); openPage('editPage');
        }

        // SPECIAL ADD LOGIC: New Value ko Purani Value mein Plus karna
        function addMore(date, idx, field, newVal) {
            let val = parseFloat(newVal);
            if (isNaN(val)) return;
            let rec = history[hType].find(h => h.date === date);
            if (rec) {
                let currentVal = parseFloat(rec.items[idx][field]) || 0;
                rec.items[idx][field] = (currentVal + val).toString(); // Plus kar diya
                save(() => { editH(date); if(hType==='expense') renderDK(date); });
            }
        }

        function updateEditSum(d) {
            let rec = history[hType].find(h => h.date === d);
            let t = rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
            document.getElementById('eSum').innerText = `TOTAL: ₹${t.toFixed(2)}`;
        }

        function updHF(type, d, i, f, v) {
            let ex = history[type].find(h => h.date === d);
            if (ex) { ex.items[i][f] = v; save(() => { if(type==='expense') renderDK(d); }); }
        }
        function lockH(type, d, i) {
            let ex = history[type].find(h => h.date === d);
            if (ex) { ex.items[i].done = !ex.items[i].done; save(() => { if(type==='expense') renderDK(d); if(document.getElementById('editPage').style.display==='flex') editH(d); }); }
        }
        function delHI(type, d, i) {
            if (confirm("Hataein?")) { history[type].find(h => h.date === d).items.splice(i, 1); save(() => { if(type==='expense') renderDK(d); if(document.getElementById('editPage').style.display==='flex') editH(d); }); }
        }
        function delH(d) { if (confirm("Delete day?")) { history[hType] = history[hType].filter(h => h.date !== d); save(() => renderH()); } }

        // BILL & FINAL LIST
        function showFinalList() {
            let sel = items.filter(it => it.sel);
            if (!sel.length) return alert("Pehle select karein!");
            let out = document.getElementById('fOut');
            out.innerHTML = `<h2 style="text-align:center; color:#0984e3; padding:10px;">🛒 SAMAN LIST</h2>`;
            ['GROCERY','SABJI','BODY','ANYA'].forEach(c => {
                let f = sel.filter(it => it.cat === c);
                if (f.length) {
                    out.innerHTML += `<div style="background:#2d3436; color:#fff; padding:5px 10px; border-radius:4px; margin:10px 0;">${c}</div>` +
                    f.map((it, j) => `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #ccc;"><span>${j+1}. ${it.name}</span><b>${it.qty} ${it.unit}</b></div>`).join('');
                }
            });
            openPage('listPage');
        }
        function openCalc() {
            tCalc = items.filter(it => it.sel).map(it => ({ name: it.name, qty: it.qty, unit: it.unit, price: '', done: false }));
            renderC(); openPage('calcPage');
        }
        function renderC() {
            let area = document.getElementById('cList');
            area.innerHTML = tCalc.map((it, i) => `<div class="edit-grid" style="grid-template-columns:1fr 60px 80px 40px;">
                <b>${it.name}</b> <small>${it.qty}${it.unit}</small>
                <input type="number" placeholder="₹" oninput="tCalc[${i}].price=this.value; renderCSum()" class="p-box" inputmode="decimal">
                <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="tCalc[${i}].done=!tCalc[${i}].done; renderC()">${it.done?'✓':'🔒'}</button>
            </div>`).join('');
            renderCSum();
        }
        function renderCSum() {
            let total = tCalc.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
            document.getElementById('cSum').innerText = `BILL TOTAL: ₹${total.toFixed(2)}`;
        }
        function takeShot() {
            html2canvas(document.getElementById('shotArea')).then(c => {
                let a = document.createElement('a'); a.download = 'List.png'; a.href = c.toDataURL(); a.click();
            });
        }
    </script>
</body>
</html>
