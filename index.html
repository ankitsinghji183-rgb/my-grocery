<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro V2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        input:disabled{background:#f1f2f6;color:#7f8c8d;border:1px dashed #bdc3c7;font-weight:bold;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;width:36px;}
        .ok-btn{background:#2ecc71!important;min-width:36px;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;min-width:36px;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;border-bottom:1px solid #f1f2f6;background:white;margin-bottom:3px;border-radius:8px;}
        .sel-bg{background:#fff9db!important;border-left:4px solid #fcc419;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .dk-grid, .edit-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .month-header{background:#dfe6e9;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;}
        .add-row{background:#e8f5e9;padding:10px 8px;margin:8px;border-radius:8px;border:1px dashed #2ecc71;flex-shrink:0;}
        .lang-btn{padding:6px 14px;border:2px solid #0984e3;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;background:white;color:#0984e3;}
        .lang-btn.active{background:#0984e3;color:white;}
        .diet-highlight { border-left: 5px solid #2ecc71; background: #f7fff7 !important; }
    </style>
</head>
<body>

<div id="mainView">
    <div style="display:flex;gap:8px;padding:8px 10px;flex-shrink:0;">
        <div class="h-box" style="flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;" onclick="hType='shopping';openPage('hPage');renderH();">📦 Saman Hist</div>
        <div class="h-box" style="flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;" onclick="hType='expense';openPage('hPage');renderH();">💰 Kharch Hist</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:76px;flex-shrink:0;">
                <option value="GROCERY">GROCERY</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')" id="btn-All" class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GRO</button>
            <button onclick="setFilter('SABJI')" id="btn-SABJI" class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')" id="btn-BODY" class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')" id="btn-OTHER" class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<div id="dailyKharchPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💸 Daily Kharcha</span>
        <span style="font-size:12px;opacity:0.85;" id="dkDateLabel"></span>
    </div>
    <div class="add-row">
        <div class="in-row">
            <input type="text" id="kName" style="flex:1;" placeholder="Item name">
            <input type="number" id="kQty" class="u-box" placeholder="Qty" inputmode="decimal">
            <input type="number" id="kPrice" class="p-box" placeholder="₹ Rate" inputmode="decimal">
            <button class="btn" onclick="addK()" style="background:#2ecc71;width:48px;">ADD</button>
        </div>
    </div>
    <div class="scroll" id="dkList"></div>
    <div id="dkSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="hPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span id="hTitle">History</span><span></span></div><div class="scroll" id="hArea"></div></div>
<div id="editPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>✏️ Edit</span><span></span></div><div class="scroll" id="eList"></div><div id="eSum" class="sum-box"></div></div>
<div id="listPage" class="full-page">
    <div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>🛒 Shopping List</span>
        <div style="display:flex;gap:6px;"><button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button><button class="lang-btn" id="btnEn" onclick="setLang('en')">ENG</button></div>
    </div>
    <div class="scroll" style="background:#fff;"><div id="shotArea" style="padding:18px;background:white;"><div id="fOut"></div></div></div>
    <div class="b-nav"><button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button></div>
</div>

<script>
const firebaseConfig = { databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('grocery/3');

let items = [], appHistory = { shopping:[], expense:[] }, activeF='All', hType='shopping', listLang='hi';
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

db.once('value', snap => {
    const d = snap.val();
    if(d){ items = d.items || []; appHistory = d.history || {shopping:[],expense:[]}; }
    renderMaster();
});

function save(){ db.set({items, history:appHistory}); }

function openPage(id){
    document.querySelectorAll('.full-page, #mainView').forEach(p=>p.style.display='none');
    document.getElementById(id).style.display='flex';
    window.history.pushState({p:id},'');
}
function closePage(){ window.history.back(); }
window.onpopstate=()=>{
    document.querySelectorAll('.full-page').forEach(p=>p.style.display='none');
    document.getElementById('mainView').style.display='flex';
    renderMaster();
};

// MASTER LIST
function renderMaster(){
    let cont=document.getElementById('masterList');
    let q=document.getElementById('itemName').value.toLowerCase();
    const dietKeys = ['millet', 'ragi', 'jowar', 'methi', 'bore bansi'];
    let filtered=items.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    
    cont.innerHTML=filtered.map((it, idx)=>{
        let i = items.indexOf(it);
        let isDiet = dietKeys.some(k => it.name.toLowerCase().includes(k));
        return `<div class="item-row ${it.sel?'sel-bg':''} ${isDiet?'diet-highlight':''}">
            <span onclick="toggleI(${i})" style="font-size:13px;"><b>${it.name}</b></span>
            <input type="number" value="${it.qty}" onchange="items[${i}].qty=this.value; items[${i}].sel=(this.value>0); save(); renderMaster();" class="u-box" inputmode="decimal">
            <select onchange="items[${i}].unit=this.value;save();" class="unit-sel">
                <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option>
                <option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option>
                <option value="Ltr" ${it.unit=='Ltr'?'selected':''}>Ltr</option>
            </select>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
}
function toggleI(i){ items[i].sel=!items[i].sel; save(); renderMaster(); }
function addItem(){
    let n=document.getElementById('itemName').value.trim();
    if(n){ items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:true,qty:'',unit:'Kg'}); save(); document.getElementById('itemName').value=''; renderMaster(); }
}
function delItem(i){ if(confirm("Hata dein?")){ items.splice(i,1); save(); renderMaster(); } }
function setFilter(f){ activeF=f; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+f).classList.add('active'); renderMaster(); }
function unselectAll(){ if(confirm("Sab clear?")){ items.forEach(it=>it.sel=false); save(); renderMaster(); } }

// DAILY KHARCH - FIX APPLIED HERE
function openDailyKharch(){
    let today = new Date().toLocaleDateString('en-GB');
    document.getElementById('dkDateLabel').innerText = today;
    openPage('dailyKharchPage');
    setTimeout(() => renderDK(today), 50); // Small delay to ensure display:flex is painted
}

function addK(){
    let today = new Date().toLocaleDateString('en-GB');
    let n = document.getElementById('kName').value.trim();
    let q = parseFloat(document.getElementById('kQty').value) || 0;
    let p = parseFloat(document.getElementById('kPrice').value) || 0;
    if(!n) return;

    if(!Array.isArray(appHistory.expense)) appHistory.expense = [];
    let rec = appHistory.expense.find(h => h.date === today);
    if(!rec){ rec = {date:today, items:[]}; appHistory.expense.unshift(rec); }

    let ex = rec.items.find(e => e.name.toLowerCase() === n.toLowerCase());
    if(ex){ ex.qty += q; ex.price += p; } 
    else { rec.items.push({name:n, qty:q, price:p, done:false}); }

    document.getElementById('kName').value = '';
    document.getElementById('kQty').value = '';
    document.getElementById('kPrice').value = '';
    
    save();
    renderDK(today); 
}

function renderDK(d){
    const area = document.getElementById('dkList');
    const rec = appHistory.expense.find(h => h.date === d);
    let total = 0;
    if(!rec || !rec.items.length){
        area.innerHTML = "<p style='text-align:center;padding:20px;color:grey;'>No records.</p>";
        document.getElementById('dkSum').innerText = "TOTAL: ₹0";
        return;
    }
    area.innerHTML = rec.items.map((it, i) => {
        total += it.price;
        return `<div class="dk-grid">
            <span>${i+1}</span>
            <b>${it.name}</b>
            <input type="number" value="${it.qty}" onchange="dkUpd('${d}',${i},'qty',this.value)" class="u-box">
            <input type="number" value="${it.price}" onchange="dkUpd('${d}',${i},'price',this.value)" class="p-box">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="dkLock('${d}',${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="dkDel('${d}',${i})">✕</button>
        </div>`;
    }).join('');
    document.getElementById('dkSum').innerText = `TOTAL: ₹${total.toFixed(2)}`;
}

function dkUpd(d,i,f,v){ let r=appHistory.expense.find(h=>h.date===d); r.items[i][f]=parseFloat(v)||0; save(); renderDK(d); }
function dkLock(d,i){ let r=appHistory.expense.find(h=>h.date===d); r.items[i].done=!r.items[i].done; save(); renderDK(d); }
function dkDel(d,i){ if(confirm("Delete?")){ let r=appHistory.expense.find(h=>h.date===d); r.items.splice(i,1); save(); renderDK(d); } }

// SMART QUANTITY & FINAL LIST
function fmtQty(qty, unit, lang){
    let q = parseFloat(qty); if(!q) return "";
    if(lang==='en') return `${qty} ${unit}`;
    const dec = q % 1; const num = Math.floor(q);
    let p = "";
    if(Math.abs(dec-0.25)<0.01) p="पाव";
    else if(Math.abs(dec-0.5)<0.01) p="आधा";
    else if(Math.abs(dec-0.75)<0.01) p="पौन";
    let u = unit==='Kg'?'किलो':unit==='Ltr'?'लीटर':'पीस';
    if(p && num===0) return `${p} ${u}`;
    if(p && num>0) return `${num} और ${p} ${u}`;
    return `${q} ${u}`;
}

function showFinalList(){
    let sel = items.filter(it=>it.sel);
    if(!sel.length) return alert("Select items!");
    let out = document.getElementById('fOut');
    out.innerHTML = `<h2 style="text-align:center; color:#0984e3; margin-bottom:10px;">🛒 SHOPPING LIST</h2>`;
    ['GROCERY','SABJI','BODY','OTHER'].forEach(cat => {
        let f = sel.filter(it => it.cat === cat);
        if(f.length){
            out.innerHTML += `<div style="background:#333; color:#fff; padding:4px 10px; border-radius:4px; margin:10px 0;">${cat}</div>`;
            f.forEach((it, idx) => {
                out.innerHTML += `<div style="display:grid; grid-template-columns: 1fr 100px 60px; padding:8px 0; border-bottom:1px dashed #ccc;">
                    <span>${idx+1}. ${it.name}</span>
                    <span style="color:#0984e3; font-weight:bold;">${fmtQty(it.qty, it.unit, listLang)}</span>
                    <span style="color:grey;">₹____</span>
                </div>`;
            });
        }
    });
    openPage('listPage');
}

function setLang(l){ listLang=l; document.getElementById('btnHi').classList.toggle('active',l==='hi'); document.getElementById('btnEn').classList.toggle('active',l==='en'); showFinalList(); }
function takeShot(){ html2canvas(document.getElementById('shotArea')).then(c=>{ let a=document.createElement('a'); a.download='List.png'; a.href=c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
