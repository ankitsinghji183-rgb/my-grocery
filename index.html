<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        #loadingScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:#0984e3;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:white;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;}
        input:disabled{background:#f1f2f6;color:#7f8c8d;border:1px dashed #bdc3c7;font-weight:bold;}
        .u-box{width:50px!important;text-align:center;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;width:36px;}
        .ok-btn{background:#2ecc71!important;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;border-bottom:1px solid #f1f2f6;}
        .edit-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .calc-row{display:grid;grid-template-columns:1fr 62px 76px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;}
        .hist-row{display:grid;grid-template-columns:1fr 82px 40px 40px;gap:5px;align-items:center;padding:10px 7px;background:white;margin-bottom:3px;border-radius:8px;}
        .sel-bg{background:#fff9db!important;border-left:4px solid #fcc419;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .top-hist{display:flex;gap:8px;padding:8px 10px;flex-shrink:0;}
        .h-box{flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;}
        .month-header{background:#dfe6e9;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;}
        .add-row{background:#e8f5e9;padding:10px 8px;border-radius:8px;border:1px dashed #2ecc71;}
        .lang-btn{padding:5px 12px;border:2px solid white;border-radius:8px;font-weight:800;font-size:12px;background:transparent;color:white;}
        .lang-btn.active{background:white;color:#0984e3;}
    </style>
</head>
<body>

<div id="loadingScreen"><h2>🛒 Grocery Master</h2><p>Data load ho raha hai...</p></div>

<div id="mainView" style="display:none;">
    <div class="top-hist">
        <div class="h-box" onclick="openKharchHist()">💰 Kharch History</div>
        <div class="h-box" onclick="openSamanHist()">📦 Saman History</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Saman search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:66px;font-size:11px;">
                <option value="GROCERY">GROC</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')"     id="btn-All"     class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GROC</button>
            <button onclick="setFilter('SABJI')"   id="btn-SABJI"   class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')"    id="btn-BODY"    class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')"   id="btn-OTHER"   class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<div id="kharchHistPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>💰 Kharch History</span><span></span></div><div class="scroll" id="kharchHistArea"></div></div>
<div id="samanHistPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>📦 Saman History</span><span></span></div><div class="scroll" id="samanHistArea"></div></div>

<div id="kharchEditPage" class="full-page">
    <div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>💰 Kharch</span><span id="kharchEditDate" style="font-size:12px;"></span></div>
    <div class="add-row" style="margin:8px;"><div class="in-row"><input type="text" id="kAddName" style="flex:1;" placeholder="Item"><input type="number" id="kAddQty" class="u-box" placeholder="Qty"><input type="number" id="kAddPrice" class="p-box" placeholder="₹"><button class="btn" style="background:#2ecc71;width:48px;" onclick="kAddItem()">ADD</button></div></div>
    <div class="scroll" id="kEditList"></div>
    <div id="kEditSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="samanEditPage" class="full-page">
    <div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>📦 Saman Edit</span><span id="samanEditDate" style="font-size:12px;"></span></div>
    <div class="add-row" style="margin:8px;"><div class="in-row"><input type="text" id="sAddName" style="flex:1;" placeholder="Item"><input type="number" id="sAddQty" class="u-box" placeholder="Qty"><input type="number" id="sAddPrice" class="p-box" placeholder="₹"><button class="btn" style="background:#2ecc71;width:48px;" onclick="sAddItem()">ADD</button></div></div>
    <div class="scroll" id="sEditList"></div>
    <div id="sEditSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="calcPage" class="full-page">
    <div class="p-head"><span class="back" onclick="calcBack()">BACK</span><span>💰 Bill Calc</span><span></span></div>
    <div class="scroll" id="cList"></div>
    <div class="b-nav"><button class="btn" style="background:#2ecc71;flex:1;height:46px;" onclick="calcConfirmSave()">✅ CONFIRM SAVE</button></div>
    <div id="cSum" class="sum-box">BILL TOTAL: ₹0</div>
</div>

<div id="listPage" class="full-page">
    <div class="p-head"><span class="back" onclick="closePage()">BACK</span><span id="listTitle">सामान सूची</span><div style="display:flex;gap:5px;"><button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button><button class="lang-btn" id="btnEn" onclick="setLang('en')">ENG</button></div></div>
    <div class="scroll" style="background:#fff;"><div id="shotArea" style="padding:18px;background:white;"><div id="fOut"></div></div></div>
    <div class="b-nav"><button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button><button class="btn" style="background:#2ecc71;flex:1;height:48px;" onclick="openCalc()">💰 CALC</button></div>
</div>

<script>
// ====== CONFIG & STATE ======
const firebaseConfig={databaseURL:"https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/"};
firebase.initializeApp(firebaseConfig);
const DB=firebase.database().ref('grocery/3');

let items=[],expense=[],shopping=[],activeF='All',tCalc=[],listLang='hi',curKharchDate='',curSamanDate='';
const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// ====== INIT ======
DB.get().then(snap=>{
    const d=snap.val()||{};
    items=toArr(d.items);
    expense=toArr(d.history?.expense);
    shopping=toArr(d.history?.shopping);
    document.getElementById('loadingScreen').style.display='none';
    document.getElementById('mainView').style.display='flex';
    renderMaster();
});

function toArr(x){return Array.isArray(x)?x:Object.values(x||{});}
function save(){DB.set({items,history:{expense,shopping}});}

// ====== MASTER LIST (Selection Always Top) ======
function renderMaster(){
    let cont=document.getElementById('masterList'); if(!cont) return;
    let q=document.getElementById('itemName').value.toLowerCase();
    
    // Filter logic
    let filtered = items.filter(it=>(activeF==='All'||it.cat===activeF)&&it.name.toLowerCase().includes(q));
    
    // SORT: Selected items first
    let sorted = [...filtered].sort((a,b) => (b.sel === a.sel)? 0 : b.sel? 1 : -1);

    cont.innerHTML=sorted.map(it=>{
        let i=items.indexOf(it);
        return `<div class="item-row ${it.sel?'sel-bg':''}">
            <span onclick="toggleI(${i})" style="flex:1;"><b>${it.name}</b></span>
            <input type="number" value="${it.qty||''}" onchange="items[${i}].qty=this.value;save();" class="u-box" inputmode="decimal">
            <select onchange="items[${i}].unit=this.value;save();" class="unit-sel">
                <option value="Kg" ${it.unit=='Kg'?'selected':''}>Kg</option>
                <option value="Pc" ${it.unit=='Pc'?'selected':''}>Pc</option>
                <option value="Ltr" ${it.unit=='Ltr'?'selected':''}>Ltr</option>
                <option value="Rs" ${it.unit=='Rs'?'selected':''}>Rs</option>
            </select>
            <input type="checkbox" ${it.sel?'checked':''} onclick="toggleI(${i})" style="width:20px;">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
}

function toggleI(i){items[i].sel=!items[i].sel; save(); renderMaster();}
function addItem(){
    let n=document.getElementById('itemName').value.trim(); if(!n) return;
    items.unshift({name:n,cat:document.getElementById('catSelect').value,sel:true,qty:'',unit:'Kg'});
    save(); document.getElementById('itemName').value=''; renderMaster();
}
function delItem(i){if(confirm("Hataein?")){items.splice(i,1);save();renderMaster();}}
function setFilter(f){activeF=f; document.querySelectorAll('.f-btn').forEach(b=>b.classList.remove('active')); document.getElementById('btn-'+f).classList.add('active'); renderMaster();}
function unselectAll(){if(confirm("Clear?")){items.forEach(it=>it.sel=false);save();renderMaster();}}

// ====== DAILY KHARCH ======
function openDailyKharch(){
    curKharchDate=new Date().toLocaleDateString('en-GB');
    let rec=expense.find(h=>h.date===curKharchDate);
    if(!rec){rec={date:curKharchDate,items:[]}; expense.unshift(rec); save();}
    renderKharchEdit();
    showPage('kharchEditPage');
}

function renderKharchEdit(){
    document.getElementById('kharchEditDate').innerText=curKharchDate;
    let rec=expense.find(h=>h.date===curKharchDate);
    let area=document.getElementById('kEditList');
    area.innerHTML=rec.items.map((it,i)=>`
        <div class="edit-grid">
            <span>${i+1}</span>
            <input type="text" value="${it.name}" onchange="kField(${i},'name',this.value)">
            <input type="number" value="${it.qty||''}" onchange="kField(${i},'qty',this.value)" class="u-box">
            <input type="number" value="${it.price||''}" onchange="kField(${i},'price',this.value)" class="p-box">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="kLock(${i})">${it.done?'✓':'🔒'}</button>
            <button class="btn del-btn" onclick="kDel(${i})">✕</button>
        </div>`).join('');
    let t=rec.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
    document.getElementById('kEditSum').innerText=`TOTAL: ₹${t.toFixed(2)}`;
}

function kAddItem(){
    let n=document.getElementById('kAddName').value.trim(), q=document.getElementById('kAddQty').value, p=document.getElementById('kAddPrice').value;
    if(!n) return;
    let rec=expense.find(h=>h.date===curKharchDate);
    rec.items.push({name:n,qty:q,price:p,done:false});
    document.getElementById('kAddName').value=''; document.getElementById('kAddQty').value=''; document.getElementById('kAddPrice').value='';
    renderKharchEdit(); save();
}
function kField(i,f,v){let rec=expense.find(h=>h.date===curKharchDate); rec.items[i][f]=(f==='name'?v:parseFloat(v)||0); renderKharchEdit(); save();}
function kLock(i){let rec=expense.find(h=>h.date===curKharchDate); rec.items[i].done=!rec.items[i].done; renderKharchEdit(); save();}
function kDel(i){let rec=expense.find(h=>h.date===curKharchDate); rec.items.splice(i,1); renderKharchEdit(); save();}

// ====== CALC & AUTO SAVE ======
function openCalc(){
    tCalc=items.filter(it=>it.sel).map(it=>({name:it.name,qty:it.qty,unit:it.unit,price:0,done:false}));
    renderC(); showPage('calcPage');
}

function renderC(){
    document.getElementById('cList').innerHTML=tCalc.map((it,i)=>`
        <div class="calc-row">
            <b>${it.name}</b><span>${it.qty} ${it.unit}</span>
            <input type="number" value="${it.price||''}" onchange="calcPrice(${i},this.value)" class="p-box" placeholder="₹">
            <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="calcLock(${i})">${it.done?'✓':'🔒'}</button>
        </div>`).join('');
    renderCSum();
}

function calcPrice(i,v){ tCalc[i].price=parseFloat(v)||0; renderCSum(); autoSaveCalc(); }
function calcLock(i){ tCalc[i].done=!tCalc[i].done; renderC(); autoSaveCalc(); }

function autoSaveCalc(){
    let d=new Date().toLocaleDateString('en-GB');
    let rec=shopping.find(h=>h.date===d);
    if(!rec){rec={date:d,items:[]}; shopping.unshift(rec);}
    rec.items=tCalc.map(it=>({...it}));
    save();
}

function calcConfirmSave(){ autoSaveCalc(); alert("Saved in Saman History!"); closePage(); }
function renderCSum(){ let t=tCalc.reduce((a,b)=>a+(parseFloat(b.price)||0),0); document.getElementById('cSum').innerText=`BILL TOTAL: ₹${t.toFixed(2)}`; }

// ====== NAVIGATION & UI HELPERS ======
function showPage(id){ document.querySelectorAll('.full-page').forEach(p=>p.style.display='none'); document.getElementById('mainView').style.display='none'; document.getElementById(id).style.display='flex'; window.history.pushState({p:id},''); }
function closePage(){ window.history.back(); }
window.onpopstate=()=>{ document.querySelectorAll('.full-page').forEach(p=>p.style.display='none'); document.getElementById('mainView').style.display='flex'; renderMaster(); };
function calcBack(){ closePage(); }

// (Baaki Function jaise SamanHist, Lang, TakeShot purane code wale hi rahenge...)
function openKharchHist(){ renderKharchHist(); showPage('kharchHistPage'); }
function renderKharchHist(){
    let area=document.getElementById('kharchHistArea'); area.innerHTML='';
    let sorted=[...expense].sort((a,b)=>dateDiff(b.date,a.date));
    sorted.forEach(h=>{
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        area.innerHTML+=`<div class="hist-row"><span>${h.date}</span><b>₹${dTot}</b><button class="btn ok-btn" onclick="openKharchEdit('${h.date}')">EDIT</button></div>`;
    });
}
function openKharchEdit(d){curKharchDate=d; renderKharchEdit(); showPage('kharchEditPage');}
function dateDiff(a,b){let da=a.split('/'), db=b.split('/'); return new Date(da[2],da[1]-1,da[0])-new Date(db[2],db[1]-1,db[0]);}

// Saman Hist simple version
function openSamanHist(){
    let area=document.getElementById('samanHistArea'); area.innerHTML='';
    shopping.forEach(h=>{
        let dTot=h.items.reduce((a,b)=>a+(parseFloat(b.price)||0),0);
        area.innerHTML+=`<div class="hist-row"><span>${h.date}</span><b>₹${dTot}</b></div>`;
    });
    showPage('samanHistPage');
}

function showFinalList(){
    let sel=items.filter(it=>it.sel); if(!sel.length) return;
    let out=document.getElementById('fOut'); out.innerHTML=sel.map(it=>`<div>${it.name} - ${it.qty} ${it.unit}</div>`).join('');
    showPage('listPage');
}
function takeShot(){ html2canvas(document.getElementById('shotArea')).then(c=>{ let a=document.createElement('a'); a.download='list.png'; a.href=c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
