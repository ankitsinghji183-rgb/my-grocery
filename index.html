<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;outline:none;margin:0;padding:0;}
        html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;background:#f0f4f8;color:#2d3436;}
        .full-page{position:fixed;top:0;left:0;width:100%;height:100%;background:#f0f4f8;display:none;flex-direction:column;z-index:200;overflow:hidden;}
        #mainView{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;z-index:1;background:#f0f4f8;}
        .p-head{background:#0984e3;color:white;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:16px;box-shadow:0 3px 10px rgba(0,0,0,0.15);flex-shrink:0;}
        .back{cursor:pointer;padding:4px 10px;background:rgba(255,255,255,0.2);border-radius:6px;font-size:13px;}
        .scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;-webkit-overflow-scrolling:touch;}
        .card{background:white;padding:10px;margin-bottom:8px;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,0.06);border:1px solid #e1e8ed;flex-shrink:0;}
        .in-row{display:flex;gap:5px;width:100%;align-items:center;}
        input,select{padding:7px 5px;border:1px solid #dfe6e9;border-radius:8px;font-size:13px;height:40px;background:#fff;min-width:0;}
        .u-box{width:50px!important;text-align:center;flex-shrink:0;}
        .p-box{width:76px!important;font-weight:800;color:#27ae60;flex-shrink:0;}
        .unit-sel{width:58px!important;font-size:12px;background:#f1f2f6;border:none;flex-shrink:0;}
        .btn{border:none;border-radius:8px;color:white;font-weight:700;cursor:pointer;font-size:12px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;white-space:nowrap;}
        .f-btn{flex:1;padding:10px 2px;background:#636e72;font-size:9px;font-weight:800;height:34px;}
        .f-btn.active{background:#0984e3!important;}
        .del-btn{background:#ff7675!important;min-width:36px;width:36px;}
        .ok-btn{background:#2ecc71!important;min-width:36px;width:36px;}
        .lock-btn{background:#fdcb6e!important;color:#2d3436;min-width:36px;width:36px;}
        .item-row{display:grid;grid-template-columns:1fr 50px 58px 26px 36px;gap:5px;align-items:center;padding:10px 7px;border-bottom:1px solid #f1f2f6;background:white;margin-bottom:3px;border-radius:8px;}
        .dk-grid{display:grid;grid-template-columns:20px 1fr 50px 76px 36px 36px;gap:4px;align-items:center;padding:9px 6px;background:white;margin-bottom:3px;border-radius:6px;border-bottom:1px solid #eee;}
        .sum-box{padding:12px 15px;background:#e3f2fd;font-weight:900;text-align:right;border-top:3px solid #0984e3;font-size:16px;color:#0984e3;flex-shrink:0;}
        .b-nav{width:100%;background:white;padding:8px 10px;border-top:1px solid #dfe6e9;display:flex;gap:8px;flex-shrink:0;}
        .top-hist{display:flex;gap:8px;padding:8px 10px;flex-shrink:0;}
        .h-box{flex:1;background:#f8f9fa;border:1px solid #dfe6e9;padding:12px 0;text-align:center;border-radius:12px;font-weight:800;font-size:11px;color:#0984e3;cursor:pointer;}
        .month-header{background:#dfe6e9;padding:8px 12px;font-weight:800;font-size:12px;border-radius:6px;margin-bottom:3px;}
        .add-row{background:#e8f5e9;padding:10px 8px;margin:8px 0 0;border-radius:8px;border:1px dashed #2ecc71;}
        .add-row-title{font-size:13px;font-weight:800;color:#27ae60;margin-bottom:6px;}
        .lang-btn{padding:6px 14px;border:2px solid #0984e3;border-radius:8px;font-weight:800;font-size:13px;cursor:pointer;background:white;color:#0984e3;}
        .lang-btn.active{background:#0984e3;color:white;}
    </style>
</head>
<body>

<div id="mainView">
    <div class="top-hist">
        <div class="h-box" onclick="hType='shopping';openPage('hPage');renderH();">📦 Saman History</div>
        <div class="h-box" onclick="hType='expense';openPage('hPage');renderH();">💰 Kharch History</div>
    </div>
    <div class="card" style="margin:0 8px 6px;">
        <div class="in-row" style="margin-bottom:7px;">
            <input type="text" id="itemName" placeholder="Search ya add..." style="flex:1;" oninput="renderMaster()">
            <select id="catSelect" style="width:76px;">
                <option value="GROCERY">GROC</option>
                <option value="SABJI">SABJI</option>
                <option value="BODY">BODY</option>
                <option value="OTHER">ANYA</option>
            </select>
            <button onclick="addItem()" class="btn" style="background:#2ecc71;width:46px;">ADD</button>
        </div>
        <div style="display:flex;gap:3px;">
            <button onclick="setFilter('All')" id="btn-All" class="btn f-btn active">ALL</button>
            <button onclick="setFilter('GROCERY')" id="btn-GROCERY" class="btn f-btn">GROC</button>
            <button onclick="setFilter('SABJI')" id="btn-SABJI" class="btn f-btn">SABJI</button>
            <button onclick="setFilter('BODY')" id="btn-BODY" class="btn f-btn">BODY</button>
            <button onclick="setFilter('OTHER')" id="btn-OTHER" class="btn f-btn">ANYA</button>
            <button onclick="unselectAll()" class="btn f-btn" style="background:#d63031;flex:0.7;">CLR</button>
        </div>
    </div>
    <div id="masterList" class="scroll"></div>
    <div class="b-nav">
        <button class="btn" style="background:#0984e3;flex:1;height:50px;" onclick="showFinalList()">📋 LIST BANAO</button>
        <button class="btn" style="background:#f39c12;flex:1;height:50px;" onclick="openDailyKharch()">💸 DAILY KHARCH</button>
    </div>
</div>

<div id="dailyKharchPage" class="full-page">
    <div class="p-head">
        <span class="back" onclick="closePage()">BACK</span>
        <span>💸 Daily Kharcha</span>
        <span style="font-size:12px;" id="dkDateLabel"></span>
    </div>
    <div class="add-row" style="margin:8px;">
        <div class="add-row-title">Item Jodo</div>
        <div class="in-row">
            <input type="text" id="kName" style="flex:1;" placeholder="Naam">
            <input type="number" id="kQty" class="u-box" placeholder="Qty" inputmode="decimal">
            <input type="number" id="kPrice" class="p-box" placeholder="Rate" inputmode="decimal">
            <button class="btn" onclick="addK()" style="background:#2ecc71;width:48px;">ADD</button>
        </div>
    </div>
    <div class="scroll" id="dkList"></div>
    <div id="dkSum" class="sum-box">TOTAL: ₹0</div>
</div>

<div id="hPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span id="hTitle">History</span><span></span></div><div class="scroll" id="hArea"></div></div>
<div id="editPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>✏️ Edit</span><span></span></div><div class="scroll" id="eList"></div><div id="eSum" class="sum-box"></div></div>
<div id="calcPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>💸 Bill Calc</span><span></span></div><div class="scroll" id="cList"></div><div id="cSum" class="sum-box"></div></div>
<div id="listPage" class="full-page"><div class="p-head"><span class="back" onclick="closePage()">BACK</span><span>🛒 List</span><div style="display:flex;gap:6px;"><button class="lang-btn active" id="btnHi" onclick="setLang('hi')">हिंदी</button><button class="lang-btn" id="btnEn" onclick="setLang('en')">ENG</button></div></div><div class="scroll" style="background:#fff;"><div id="shotArea" style="padding:18px;"><div id="fOut"></div></div></div><div class="b-nav"><button class="btn" style="background:#f39c12;flex:1;height:48px;" onclick="takeShot()">📷 SAVE IMAGE</button><button class="btn" style="background:#0984e3;flex:1;height:48px;" onclick="openCalc()">💸 CALC</button></div></div>

<script>
const firebaseConfig = { databaseURL: "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('grocery/3');

let items = [], appHistory = { shopping: [], expense: [] };
let activeF = 'All', hType = 'shopping', activePage = 'main', listLang = 'hi';
const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

function getToday() { return new Date().toLocaleDateString('en-GB'); }

// Live Sync from Firebase
db.on('value', snap => {
    const d = snap.val() || {};
    items = d.items || [];
    appHistory = d.history || { shopping: [], expense: [] };
    if (!Array.isArray(appHistory.shopping)) appHistory.shopping = Object.values(appHistory.shopping || {});
    if (!Array.isArray(appHistory.expense)) appHistory.expense = Object.values(appHistory.expense || {});
    
    if (activePage === 'main') renderMaster();
    if (activePage === 'dailyKharchPage') renderDK(getToday());
});

function save() { db.update({ items, history: appHistory }); }

function openPage(id) {
    activePage = id;
    document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    document.getElementById('mainView').style.display = 'none';
    document.getElementById(id).style.display = 'flex';
    window.history.pushState({ p: id }, '');
}

function closePage() { activePage = 'main'; window.history.back(); }
window.onpopstate = () => {
    activePage = 'main';
    document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    document.getElementById('mainView').style.display = 'flex';
};

// MASTER LIST
function renderMaster() {
    let cont = document.getElementById('masterList');
    let q = document.getElementById('itemName').value.toLowerCase();
    let filtered = items.filter(it => (activeF === 'All' || it.cat === activeF) && it.name.toLowerCase().includes(q));
    cont.innerHTML = filtered.map((it, idx) => {
        let i = items.indexOf(it);
        return `<div class="item-row ${it.sel ? 'sel-bg' : ''}">
            <span onclick="toggleI(${i})" style="flex:1;"><b>${idx + 1}. ${it.name}</b></span>
            <input type="number" value="${it.qty}" onchange="items[${i}].qty=this.value;save();" class="u-box" inputmode="decimal">
            <select onchange="items[${i}].unit=this.value;save();" class="unit-sel">
                <option value="Kg" ${it.unit == 'Kg' ? 'selected' : ''}>Kg</option>
                <option value="Pc" ${it.unit == 'Pc' ? 'selected' : ''}>Pc</option>
                <option value="Ltr" ${it.unit == 'Ltr' ? 'selected' : ''}>Ltr</option>
                <option value="Rs" ${it.unit == 'Rs' ? 'selected' : ''}>Rs</option>
            </select>
            <input type="checkbox" ${it.sel ? 'checked' : ''} onclick="toggleI(${i})">
            <button class="btn del-btn" onclick="delItem(${i})">✕</button>
        </div>`;
    }).join('');
}
function toggleI(i) { items[i].sel = !items[i].sel; save(); }
function addItem() {
    let n = document.getElementById('itemName').value.trim();
    if (n) { items.unshift({ name: n, cat: document.getElementById('catSelect').value, sel: true, qty: '', unit: 'Kg' }); save(); document.getElementById('itemName').value = ''; }
}
function delItem(i) { if (confirm("Hata dein?")) { items.splice(i, 1); save(); } }
function setFilter(f) { activeF = f; document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + f).classList.add('active'); renderMaster(); }
function unselectAll() { if (confirm("Sab clear?")) { items.forEach(it => it.sel = false); save(); } }

// DAILY KHARCH - REBUILT ADD SYSTEM
function openDailyKharch() {
    document.getElementById('dkDateLabel').innerText = getToday();
    openPage('dailyKharchPage');
    renderDK(getToday());
}

function addK() {
    const today = getToday();
    const name = document.getElementById('kName').value.trim();
    const qty = parseFloat(document.getElementById('kQty').value) || 0;
    const price = parseFloat(document.getElementById('kPrice').value) || 0;

    if (!name) return alert("Naam bharein!");

    // Check if entry for today exists
    let dayEntry = appHistory.expense.find(h => h.date === today);
    if (!dayEntry) {
        dayEntry = { date: today, items: [] };
        appHistory.expense.unshift(dayEntry);
    }

    // Check if item already exists today
    let existingItem = dayEntry.items.find(it => it.name.toLowerCase() === name.toLowerCase());
    if (existingItem) {
        existingItem.qty += qty;
        existingItem.price += price;
    } else {
        dayEntry.items.push({ name, qty, price, done: false });
    }

    // Reset inputs and Save
    document.getElementById('kName').value = '';
    document.getElementById('kQty').value = '';
    document.getElementById('kPrice').value = '';
    save(); // Firebase will sync and trigger renderDK
}

function renderDK(d) {
    let area = document.getElementById('dkList');
    let rec = appHistory.expense.find(h => h.date === d);
    let total = 0;
    if (!rec || !rec.items || rec.items.length === 0) {
        area.innerHTML = "<p style='text-align:center;padding:40px;color:#999;'>Aaj koi kharcha nahi hai.</p>";
        document.getElementById('dkSum').innerText = "TOTAL: ₹0";
        return;
    }
    area.innerHTML = rec.items.map((it, i) => {
        total += parseFloat(it.price) || 0;
        return `<div class="dk-grid">
            <span style="font-size:11px;">${i + 1}.</span>
            <b style="font-size:13px;">${it.name}</b>
            <input type="number" value="${it.qty || ''}" onchange="dkUpd('${d}',${i},'qty',this.value)" class="u-box" inputmode="decimal">
            <input type="number" value="${it.price || ''}" onchange="dkUpd('${d}',${i},'price',this.value)" class="p-box" inputmode="decimal">
            <button class="btn ${it.done ? 'ok-btn' : 'lock-btn'}" onclick="dkLock('${d}',${i})">${it.done ? '✓' : '🔒'}</button>
            <button class="btn del-btn" onclick="dkDel('${d}',${i})">✕</button>
        </div>`;
    }).join('');
    document.getElementById('dkSum').innerText = `TOTAL: ₹${total.toFixed(2)}`;
}

function dkUpd(d, i, f, v) { let r = appHistory.expense.find(h => h.date === d); if (r) { r.items[i][f] = parseFloat(v) || 0; save(); } }
function dkLock(d, i) { let r = appHistory.expense.find(h => h.date === d); if (r) { r.items[i].done = !r.items[i].done; save(); } }
function dkDel(d, i) { if (confirm("Hata dein?")) { let r = appHistory.expense.find(h => h.date === d); if (r) { r.items.splice(i, 1); save(); } } }

// HISTORY & OTHER FUNCTIONS
function renderH() {
    let area = document.getElementById('hArea');
    let sorted = [...(appHistory[hType] || [])].sort((a, b) => {
        let da = a.date.split('/'), db = b.date.split('/');
        return new Date(db[2], db[1] - 1, db[0]) - new Date(da[2], da[1] - 1, da[0]);
    });
    let curM = '', html = '', mTot = 0;
    sorted.forEach(h => {
        let p = h.date.split('/'), m = months[p[1] - 1] + ' ' + p[2];
        let dTot = h.items.reduce((a, b) => a + (parseFloat(b.price) || 0), 0);
        if (curM !== m && curM !== '') { area.innerHTML += `<div class="month-header">${curM} — ₹${mTot.toFixed(2)}</div>` + html; html = ''; mTot = 0; }
        curM = m; mTot += dTot;
        html += `<div class="hist-row"><span>${h.date}</span><b>₹${dTot.toFixed(2)}</b><button class="btn ok-btn" onclick="editH('${h.date}')">EDIT</button><button class="btn del-btn" onclick="delH('${h.date}')">✕</button></div>`;
    });
    if (curM) area.innerHTML += `<div class="month-header">${curM} — ₹${mTot.toFixed(2)}</div>` + html;
}

function editH(d) {
    currentEditDate = d;
    let rec = appHistory[hType].find(h => h.date === d);
    let area = document.getElementById('eList');
    area.innerHTML = rec.items.map((it, i) => `<div class="dk-grid"><span>${i + 1}</span><input type="text" value="${it.name}" onchange="eUpd('${d}',${i},'name',this.value)"><input type="number" value="${it.qty}" onchange="eUpd('${d}',${i},'qty',this.value)" class="u-box"><input type="number" value="${it.price}" onchange="eUpd('${d}',${i},'price',this.value)" class="p-box"><button class="btn del-btn" onclick="eDel('${d}',${i})">✕</button></div>`).join('');
    openPage('editPage');
}
function eUpd(d, i, f, v) { let r = appHistory[hType].find(h => h.date === d); r.items[i][f] = (f === 'name' ? v : parseFloat(v)); save(); }
function eDel(d, i) { let r = appHistory[hType].find(h => h.date === d); r.items.splice(i, 1); save(); editH(d); }
function delH(d) { if (confirm("Delete full day?")) { appHistory[hType] = appHistory[hType].filter(h => h.date !== d); save(); renderH(); } }

function setLang(l) { listLang = l; document.getElementById('btnHi').classList.toggle('active', l === 'hi'); document.getElementById('btnEn').classList.toggle('active', l === 'en'); renderFinalList(); }

function fmtQty(q, u, l) {
    q = parseFloat(q); if (isNaN(q)) return '';
    if (l === 'en') return q + ' ' + u;
    if (u === 'Kg') return (q === 0.5 ? 'आधा किलो' : q === 0.2 ? '200 ग्राम' : q + ' किलो');
    if (u === 'Ltr') return (q === 0.5 ? 'आधा लीटर' : q === 0.2 ? '200 ML' : q + ' लीटर');
    if (u === 'Pc') return (q === 0.5 ? 'आधा पीस' : q + ' पीस');
    return q + ' ' + (u === 'Rs' ? 'रुपये' : u);
}

function showFinalList() { lastSelItems = items.filter(it => it.sel); if (lastSelItems.length) { renderFinalList(); openPage('listPage'); } }
function renderFinalList() {
    let out = document.getElementById('fOut');
    out.innerHTML = `<h2 style="text-align:center; color:#0984e3; margin-bottom:15px;">🛒 SAMAN LIST</h2>`;
    ['GROCERY', 'SABJI', 'BODY', 'OTHER'].forEach(c => {
        let f = lastSelItems.filter(it => it.cat === c);
        if (f.length) {
            out.innerHTML += `<div style="background:#2d3436; color:#fff; padding:4px 10px; border-radius:4px; margin:10px 0;">${c === 'GROCERY' ? 'GROC' : c}</div>`;
            f.forEach((it, i) => { out.innerHTML += `<div style="display:grid; grid-template-columns:1fr 100px 60px; padding:8px 0; border-bottom:1px dashed #ccc;"><span>${i + 1}. ${it.name}</span><span style="color:#0984e3;">${fmtQty(it.qty, it.unit, listLang)}</span><span>₹____</span></div>`; });
        }
    });
}

function takeShot() { html2canvas(document.getElementById('shotArea')).then(c => { let a = document.createElement('a'); a.download = 'List.png'; a.href = c.toDataURL(); a.click(); }); }

function openCalc() {
    tCalc = lastSelItems.map(it => ({ name: it.name, qty: it.qty, unit: it.unit, price: 0 }));
    let area = document.getElementById('cList');
    area.innerHTML = tCalc.map((it, i) => `<div class="calc-row"><b>${it.name}</b><span>${it.qty} ${it.unit}</span><input type="number" onchange="tCalc[${i}].price=parseFloat(this.value);updCSum()" class="p-box" inputmode="decimal"></div>`).join('');
    openPage('calcPage');
}
function updCSum() { 
    let t = tCalc.reduce((a, b) => a + (b.price || 0), 0); 
    document.getElementById('cSum').innerText = `TOTAL: ₹${t.toFixed(2)}`;
    // Auto save to history
    let d = getToday();
    let rec = appHistory.shopping.find(h => h.date === d);
    if(!rec) { rec = {date:d, items:[]}; appHistory.shopping.unshift(rec); }
    rec.items = tCalc.filter(it => it.price > 0);
    save();
}
</script>
</body>
</html>
