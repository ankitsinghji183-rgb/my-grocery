<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master v79</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f0f4f8; color: #2d3436; }
        
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f4f8; display: none; flex-direction: column; z-index: 100; }
        #mainView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 1; }
        
        .p-head { background: #0984e3; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; box-shadow: 0 3px 10px rgba(0,0,0,0.15); flex-shrink: 0; }
        
        /* Home Buttons */
        .top-nav { display: flex; gap: 8px; padding: 10px; background: #fff; border-bottom: 1px solid #dfe6e9; }
        .nav-btn { flex: 1; background: #f1f2f6; border: 1px solid #dfe6e9; padding: 12px; border-radius: 10px; text-align: center; font-weight: 800; font-size: 12px; color: #0984e3; }

        .scroll { flex: 1; overflow-y: auto; padding: 10px; -webkit-overflow-scrolling: touch; }
        .card { background: white; padding: 12px; margin-bottom: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .in-row { display: flex; gap: 6px; align-items: center; width: 100%; }
        input { padding: 8px; border: 1px solid #dfe6e9; border-radius: 8px; height: 42px; font-size: 14px; }
        .qty-in { width: 60px !important; text-align: center; }
        .price-in { width: 90px !important; font-weight: 800; color: #27ae60; }
        
        .btn { border: none; border-radius: 8px; color: white; font-weight: 700; height: 42px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .ok-btn { background: #2ecc71 !important; }
        .del-btn { background: #ff7675 !important; }
        .lock-btn { background: #fdcb6e !important; color: #2d3436; }

        /* List Styling */
        .list-item { display: grid; grid-template-columns: 1fr 50px 80px 35px 35px; gap: 5px; align-items: center; padding: 12px 8px; background: white; border-bottom: 1px solid #eee; border-radius: 8px; margin-bottom: 4px; }
        .sum-box { padding: 15px; background: #e3f2fd; font-weight: 900; text-align: right; border-top: 3px solid #0984e3; font-size: 18px; color: #0984e3; }
        .b-nav { padding: 10px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="mainView">
        <div class="p-head"><span>GROCERY MASTER v79</span></div>
        <div class="top-nav">
            <div class="nav-btn" onclick="hType='shopping'; renderHistory(); openPage('historyPage')">📦 SAMAN HISTORY</div>
            <div class="nav-btn" onclick="hType='expense'; renderHistory(); openPage('historyPage')">💰 KHARCH HISTORY</div>
        </div>
        
        <div class="scroll">
            <div class="card">
                <div class="in-row">
                    <input type="text" id="mName" placeholder="Item naam..." style="flex:1;">
                    <button class="btn ok-btn" onclick="addMaster()" style="width:60px;">ADD</button>
                </div>
            </div>
            <div id="masterList"></div>
        </div>
        <div class="b-nav">
            <button class="btn lock-btn" style="flex:1;" onclick="openDailyKharch()">💸 DAILY KHARCH KAREIN</button>
        </div>
    </div>

    <div id="dailyKharchPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span><span id="dkDate"></span></div>
        <div class="scroll">
            <div class="card">
                <div class="in-row">
                    <input type="text" id="kName" placeholder="Item..." style="flex:1;">
                    <input type="number" id="kQty" placeholder="Qty" class="qty-in" inputmode="decimal">
                    <input type="number" id="kPrice" placeholder="₹ Price" class="price-in" inputmode="decimal">
                    <button class="btn ok-btn" onclick="addExpense()" style="width:50px;">ADD</button>
                </div>
            </div>
            <div id="dkList"></div>
        </div>
        <div class="sum-box" id="dkSum">TOTAL: ₹0</div>
    </div>

    <div id="historyPage" class="full-page">
        <div class="p-head"><span onclick="closePage()">← BACK</span><span id="hTitle">History</span></div>
        <div class="scroll" id="hArea"></div>
    </div>

<script>
    // Firebase Setup
    const firebaseConfig = { databaseURL: "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('grocery/3');

    let items = [], history = { shopping: [], expense: [] }, hType = 'expense';

    // Sync Data
    db.on('value', (snap) => {
        const d = snap.val();
        if (d) {
            items = d.items || [];
            history.shopping = d.history?.shopping || [];
            history.expense = d.history?.expense || [];
            renderMaster();
            if(document.getElementById('dailyKharchPage').style.display === 'flex') {
                renderDKList(new Date().toLocaleDateString('en-GB'));
            }
        }
    });

    function save() { db.set({ items, history }); }

    // Navigation
    function openPage(id) {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        window.history.pushState({p:id}, '');
    }
    function closePage() { window.history.back(); }
    window.onpopstate = () => {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
    };

    // Master List Logic
    function renderMaster() {
        const cont = document.getElementById('masterList');
        cont.innerHTML = items.map((it, i) => `
            <div class="list-item" style="grid-template-columns: 1fr 40px;">
                <b>${it.name}</b>
                <button class="btn del-btn" onclick="items.splice(${i},1); save()">✕</button>
            </div>
        `).join('');
    }
    function addMaster() {
        let n = document.getElementById('mName').value.trim();
        if(n) { items.unshift({name: n}); save(); document.getElementById('mName').value = ''; }
    }

    // Daily Kharcha Logic
    function openDailyKharch() {
        let d = new Date().toLocaleDateString('en-GB');
        document.getElementById('dkDate').innerText = d;
        renderDKList(d);
        openPage('dailyKharchPage');
    }

    function addExpense() {
        let n = document.getElementById('kName').value.trim();
        let q = parseFloat(document.getElementById('kQty').value) || 0;
        let p = parseFloat(document.getElementById('kPrice').value) || 0;
        let d = new Date().toLocaleDateString('en-GB');

        if(!n) return;

        if(!history.expense) history.expense = [];
        let dayRec = history.expense.find(h => h.date === d);
        if(!dayRec) {
            dayRec = { date: d, items: [] };
            history.expense.unshift(dayRec);
        }

        // SMART ADD: Check if item already exists today
        let existing = dayRec.items.find(it => it.name.toLowerCase() === n.toLowerCase());
        if(existing) {
            existing.qty = (parseFloat(existing.qty) || 0) + q;
            existing.price = (parseFloat(existing.price) || 0) + p;
        } else {
            dayRec.items.push({ name: n, qty: q, price: p, done: false });
        }

        save();
        renderDKList(d);

        // Reset Inputs
        document.getElementById('kName').value = '';
        document.getElementById('kQty').value = '';
        document.getElementById('kPrice').value = '';
        document.getElementById('kName').focus();
    }

    function renderDKList(d) {
        let dayRec = history.expense.find(h => h.date === d);
        let cont = document.getElementById('dkList'), total = 0;
        
        if(!dayRec || !dayRec.items.length) {
            cont.innerHTML = "<p style='text-align:center; padding:20px; color:#999;'>Aaj koi entry nahi hai.</p>";
            document.getElementById('dkSum').innerText = "TOTAL: ₹0";
            return;
        }

        cont.innerHTML = dayRec.items.map((it, i) => {
            total += (parseFloat(it.price) || 0);
            return `
                <div class="list-item">
                    <b style="font-size:13px;">${it.name}</b>
                    <span style="font-size:12px; color:#666;">${it.qty}</span>
                    <b style="color:#27ae60;">₹${it.price}</b>
                    <button class="btn ${it.done?'ok-btn':'lock-btn'}" onclick="toggleLock('${d}',${i})">${it.done?'✓':'🔒'}</button>
                    <button class="btn del-btn" onclick="delExpenseItem('${d}',${i})">✕</button>
                </div>
            `;
        }).join('');
        document.getElementById('dkSum').innerText = `TOTAL: ₹${total.toFixed(2)}`;
    }

    function toggleLock(d, i) {
        let day = history.expense.find(h => h.date === d);
        day.items[i].done = !day.items[i].done;
        save(); renderDKList(d);
    }

    function delExpenseItem(d, i) {
        if(confirm("Delete karein?")) {
            let day = history.expense.find(h => h.date === d);
            day.items.splice(i, 1);
            save(); renderDKList(d);
        }
    }

    // History View
    function renderHistory() {
        document.getElementById('hTitle').innerText = hType === 'shopping' ? 'Saman History' : 'Kharch History';
        let area = document.getElementById('hArea');
        let data = history[hType] || [];
        area.innerHTML = data.map(h => {
            let t = h.items.reduce((a,b) => a + (parseFloat(b.price)||0), 0);
            return `<div class="list-item" style="grid-template-columns: 1fr 100px;">
                <span>${h.date}</span><b>₹${t.toFixed(2)}</b>
            </div>`;
        }).join('');
    }
</script>
</body>
</html>
