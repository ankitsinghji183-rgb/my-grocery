<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grocery Master v81 - Final Combine</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #1a73e8; --success: #28a745; --danger: #dc3545; --bg: #f4f7f6; --dark: #2d3436; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; overflow: hidden; }

        /* Full Page Layouts */
        .full-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 100; overflow: hidden; }
        #mainView { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; z-index: 1; }

        /* Headers */
        .p-head { background: var(--primary); color: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; font-weight: 700; font-size: 17px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); flex-shrink: 0; }
        .back-btn { cursor: pointer; padding: 5px 10px; background: rgba(255,255,255,0.2); border-radius: 5px; font-size: 13px; }

        /* Top Navigation (First Screen Buttons) */
        .top-nav { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 10px; background: white; border-bottom: 1px solid #ddd; }
        .nav-btn { background: #f1f3f4; border: 1px solid #dadce0; padding: 10px 4px; border-radius: 8px; text-align: center; font-weight: 800; font-size: 10px; color: var(--primary); cursor: pointer; text-transform: uppercase; }
        .nav-btn.special { background: #fff3cd; border-color: #ffeeba; color: #856404; }

        /* Input Areas */
        .card-header { background: white; padding: 10px; border-bottom: 1px solid #eee; }
        .input-row { display: flex; gap: 5px; align-items: center; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; height: 38px; background: #fff; }
        
        /* Filter Bar */
        .filter-container { display: flex; gap: 6px; padding: 8px 10px; overflow-x: auto; background: #fff; border-bottom: 1px solid #eee; scrollbar-width: none; }
        .f-btn { background: #eee; padding: 6px 14px; border-radius: 20px; font-size: 11px; border: none; font-weight: 700; flex-shrink: 0; color: #555; }
        .f-active { background: var(--primary); color: white; }

        /* List Items */
        .scroll { flex: 1; overflow-y: auto; padding: 8px; -webkit-overflow-scrolling: touch; }
        .item-row { display: flex; align-items: center; padding: 12px; border-bottom: 1px solid #f0f0f0; background: #fff; gap: 8px; border-radius: 8px; margin-bottom: 4px; }
        .selected-row { background: #e7f3ff !important; border-left: 4px solid var(--primary); }
        .item-label { flex: 1; font-weight: 700; font-size: 15px; color: #000; }
        
        /* Daily Kharcha Grid */
        .dk-grid { display: grid; grid-template-columns: 1fr 50px 85px 35px 35px; gap: 4px; align-items: center; padding: 10px; background: #fff; border-bottom: 1px solid #eee; margin-bottom: 2px; border-radius: 6px; }
        .qty-in { width: 50px; text-align: center; font-weight: bold; }
        .price-in { width: 85px; font-weight: 900; color: var(--success); text-align: right; }

        /* Buttons */
        .btn-add { background: var(--success); color: white; border: none; padding: 0 15px; border-radius: 6px; font-weight: bold; height: 38px; }
        .btn-del { background: var(--danger); color: white; border: none; border-radius: 6px; height: 32px; width: 32px; font-weight: bold; }
        .btn-lock { background: #fdcb6e; border: none; border-radius: 6px; height: 32px; width: 32px; }

        /* Footer & Summary */
        .sum-box { background: #e3f2fd; padding: 15px; text-align: right; font-weight: 900; font-size: 20px; color: var(--primary); border-top: 3px solid var(--primary); }
        .footer-btns { padding: 10px; background: white; border-top: 1px solid #ddd; display: flex; gap: 10px; }
        .gen-btn { flex: 1; background: var(--primary); color: white; text-align: center; padding: 14px; border-radius: 10px; font-weight: bold; font-size: 16px; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }

        /* History Rows */
        .hist-row { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #fff; border-bottom: 1px solid #eee; margin-bottom: 5px; border-radius: 8px; }
    </style>
</head>
<body>

<div id="mainView">
    <div class="p-head">
        <span>GROCERY MASTER v81</span>
        <div id="syncTag" style="font-size: 10px; background: #2ecc71; padding: 2px 6px; border-radius: 10px; display: none;">SYNCED</div>
    </div>

    <div class="top-nav">
        <div class="nav-btn" onclick="hType='shopping'; renderHistory(); openPage('historyPage')">📦 Saman History</div>
        <div class="nav-btn" onclick="hType='expense'; renderHistory(); openPage('historyPage')">💰 Kharch History</div>
        <div class="nav-btn special" onclick="openDailyKharch()">💸 Daily Kharcha</div>
    </div>

    <div class="card-header">
        <div class="input-row">
            <input type="text" id="mName" placeholder="Item naam..." style="flex:1;" oninput="renderMaster()">
            <select id="mCat">
                <option value="GROCERY">Groc</option>
                <option value="SABJI">Sabji</option>
                <option value="OTHER">Misc</option>
            </select>
            <button class="btn-add" onclick="addMaster()">ADD</button>
        </div>
    </div>

    <div class="filter-container">
        <button class="f-btn f-active" id="f-All" onclick="setFilter('All')">ALL</button>
        <button class="f-btn" id="f-GROCERY" onclick="setFilter('GROCERY')">GROCERY</button>
        <button class="f-btn" id="f-SABJI" onclick="setFilter('SABJI')">SABJI</button>
        <button class="f-btn" id="f-OTHER" onclick="setFilter('OTHER')">OTHER</button>
    </div>

    <div id="masterList" class="scroll"></div>

    <div class="footer-btns">
        <div class="gen-btn" onclick="generateShoppingList()">📋 BANAO LIST</div>
    </div>
</div>

<div id="dailyKharchPage" class="full-page">
    <div class="p-head">
        <span class="back-btn" onclick="closePage()">← Back</span>
        <span id="dkDateLabel">00/00/0000</span>
    </div>
    <div class="card-header">
        <div class="input-row">
            <input type="text" id="kName" placeholder="Item..." style="flex:1;">
            <input type="number" id="kQty" placeholder="Qty" class="qty-in" inputmode="decimal">
            <input type="number" id="kPrice" placeholder="₹ Price" class="price-in" inputmode="decimal">
            <button class="btn-add" onclick="addExpense()">ADD</button>
        </div>
    </div>
    <div class="scroll" id="dkListArea"></div>
    <div class="sum-box" id="dkSum">TOTAL: ₹0</div>
</div>

<div id="historyPage" class="full-page">
    <div class="p-head">
        <span class="back-btn" onclick="closePage()">← Back</span>
        <span id="hTitle">History</span>
    </div>
    <div class="scroll" id="hArea"></div>
</div>

<div id="finalListPage" class="full-page">
    <div class="p-head">
        <span class="back-btn" onclick="closePage()">← Back</span>
        <span>🛒 Final List</span>
    </div>
    <div class="scroll" id="captureArea" style="background: white; color: black; padding: 20px;">
        <h2 style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px;">SHOPPING LIST</h2>
        <div id="listOutput"></div>
    </div>
    <div class="footer-btns">
        <button class="gen-btn" onclick="saveAsImage()" style="background: #ff9800;">📷 SAVE IMAGE</button>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = { databaseURL: "https://grocerry-cc1a9-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('grocery/3');

    let items = [], history = { shopping: [], expense: [] }, currentFilter = 'All', hType = 'expense';

    // Data Sync
    db.on('value', (snap) => {
        const d = snap.val();
        if (d) {
            items = d.items || [];
            history.shopping = d.history?.shopping || [];
            history.expense = d.history?.expense || [];
            renderMaster();
            if(document.getElementById('dailyKharchPage').style.display === 'flex') {
                renderDKList(new Date().toLocaleDateString('en-GB'));
            }
            showSync();
        }
    });

    function save() { db.set({ items, history }); }
    function showSync() { 
        let s = document.getElementById('syncTag'); s.style.display = 'block';
        setTimeout(() => s.style.display = 'none', 1000);
    }

    // Navigation
    function openPage(id) {
        document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        window.history.pushState({p:id}, '');
    }
    function closePage() { window.history.back(); }
    window.onpopstate = () => document.querySelectorAll('.full-page').forEach(p => p.style.display = 'none');

    // --- HOME SCREEN (MASTER LIST) LOGIC ---
    function addMaster() {
        let name = document.getElementById('mName').value.trim();
        let cat = document.getElementById('mCat').value;
        if(name) {
            items.unshift({ name, cat, selected: true, qty: '', unit: 'Kg' });
            save(); document.getElementById('mName').value = '';
        }
    }

    function renderMaster() {
        let cont = document.getElementById('masterList');
        let search = document.getElementById('mName').value.toLowerCase();
        let filtered = items.filter(it => (currentFilter === 'All' || it.cat === currentFilter) && it.name.toLowerCase().includes(search));
        
        cont.innerHTML = filtered.map((it, i) => {
            let idx = items.indexOf(it);
            return `
            <div class="item-row ${it.selected ? 'selected-row' : ''}">
                <span class="item-label" onclick="toggleSel(${idx})">${it.name}</span>
                <input type="number" step="0.001" value="${it.qty}" oninput="items[${idx}].qty=this.value; save()" style="width:55px; text-align:center;" placeholder="0">
                <input type="checkbox" ${it.selected ? 'checked' : ''} onclick="toggleSel(${idx})" style="width:24px; height:24px;">
                <button class="btn-del" onclick="delMaster(${idx})">✕</button>
            </div>`;
        }).join('');
    }
    function toggleSel(i) { items[i].selected = !items[i].selected; save(); }
    function delMaster(i) { if(confirm("Hata dein?")) { items.splice(i,1); save(); } }
    function setFilter(f) {
        currentFilter = f;
        document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('f-active'));
        document.getElementById('f-'+f).classList.add('f-active');
        renderMaster();
    }

    // --- DAILY KHARCHA (SMART ADD & INSTANT LIST) ---
    function openDailyKharch() {
        let d = new Date().toLocaleDateString('en-GB');
        document.getElementById('dkDateLabel').innerText = d;
        renderDKList(d);
        openPage('dailyKharchPage');
    }

    function addExpense() {
        let n = document.getElementById('kName').value.trim();
        let q = parseFloat(document.getElementById('kQty').value) || 0;
        let p = parseFloat(document.getElementById('kPrice').value) || 0;
        let d = new Date().toLocaleDateString('en-GB');

        if(!n) return;
        if(!history.expense) history.expense = [];
        
        let dayRec = history.expense.find(h => h.date === d);
        if(!dayRec) {
            dayRec = { date: d, items: [] };
            history.expense.unshift(dayRec);
        }

        // SMART MERGE (Purane instructions ke mutabik: Name same toh Qty/Price Sum)
        let exist = dayRec.items.find(it => it.name.toLowerCase() === n.toLowerCase());
        if(exist) {
            exist.qty = (parseFloat(exist.qty) || 0) + q;
            exist.price = (parseFloat(exist.price) || 0) + p;
        } else {
            dayRec.items.push({ name: n, qty: q, price: p, done: false });
        }

        save();
        renderDKList(d);
        
        // Reset Inputs
        document.getElementById('kName').value = '';
        document.getElementById('kQty').value = '';
        document.getElementById('kPrice').value = '';
        document.getElementById('kName').focus();
    }

    function renderDKList(d) {
        let dayRec = history.expense.find(h => h.date === d);
        let cont = document.getElementById('dkListArea'), total = 0;
        
        if(!dayRec || !dayRec.items.length) {
            cont.innerHTML = "<p style='text-align:center; padding:30px; color:#999;'>Aaj koi kharcha nahi likha.</p>";
            document.getElementById('dkSum').innerText = "TOTAL: ₹0";
            return;
        }

        cont.innerHTML = dayRec.items.map((it, i) => {
            total += (parseFloat(it.price) || 0);
            return `
                <div class="dk-grid">
                    <b style="font-size:14px;">${it.name}</b>
                    <span class="qty-in">${it.qty}</span>
                    <b class="price-in">₹${it.price}</b>
                    <button class="btn-lock" onclick="lockExp('${d}',${i})">${it.done?'✓':'🔒'}</button>
                    <button class="btn-del" style="height:28px; width:28px; font-size:10px;" onclick="delExp('${d}',${i})">✕</button>
                </div>
            `;
        }).join('');
        document.getElementById('dkSum').innerText = `TOTAL: ₹${total.toFixed(2)}`;
    }

    function lockExp(d, i) {
        let day = history.expense.find(h => h.date === d);
        day.items[i].done = !day.items[i].done;
        save();
    }

    function delExp(d, i) {
        if(confirm("Delete item?")) {
            history.expense.find(h => h.date === d).items.splice(i, 1);
            save();
        }
    }

    // --- HISTORY VIEW ---
    function renderHistory() {
        document.getElementById('hTitle').innerText = hType === 'shopping' ? '📦 Saman History' : '💰 Kharch History';
        let area = document.getElementById('hArea');
        let data = history[hType] || [];
        
        area.innerHTML = data.length ? data.map(h => {
            let t = h.items.reduce((a,b) => a + (parseFloat(b.price)||0), 0);
            return `<div class="hist-row">
                <span><b>${h.date}</b></span>
                <b style="color:var(--primary); font-size:16px;">₹${t.toFixed(2)}</b>
            </div>`;
        }).join('') : "<p style='text-align:center; padding:20px;'>History khali hai.</p>";
    }

    // --- FINAL SHOPPING LIST GENERATION ---
    function generateShoppingList() {
        let sel = items.filter(it => it.selected);
        if(!sel.length) { alert("Pehle item choose karo!"); return; }
        
        let out = document.getElementById('listOutput');
        out.innerHTML = '';
        ['GROCERY','SABJI','OTHER'].forEach(cat => {
            let filtered = sel.filter(it => it.cat === cat);
            if(filtered.length) {
                out.innerHTML += `<h3 style="background:#eee; padding:5px; margin-top:15px;">${cat}</h3>`;
                filtered.forEach((it, i) => {
                    out.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed #ccc;">
                        <span>${i+1}. ${it.name}</span>
                        <b>${it.qty || ''}</b>
                    </div>`;
                });
            }
        });
        openPage('finalListPage');
    }

    function saveAsImage() {
        html2canvas(document.getElementById('captureArea')).then(canvas => {
            let link = document.createElement('a');
            link.download = 'Grocery_List.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>
</body>
</html>
